<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#081d4e">
  <title>Mes vidéos · Neptune Media</title>
  <link rel="icon" href="/assets/logo-neptune.svg">
  <link rel="stylesheet" href="/espace-client/videos/videos.css?v=2">
</head>
<body>
  <header class="library-header">
    <a class="brand" href="/espace-client/" aria-label="Retour au tableau de bord Neptune Media"><img src="/assets/logo-neptune.svg" alt=""><span><b>Neptune</b><small>Media</small></span></a>
    <nav class="header-actions" aria-label="Navigation de l’espace client">
      <span class="workspace">Bibliothèque vidéo</span>
      <a href="/espace-client/calendrier/">Calendrier</a>
      <a href="/espace-client/">Tableau de bord</a>
    </nav>
  </header>

  <main class="library-shell">
    <section class="library-intro">
      <div class="intro-copy">
        <p class="eyebrow">VOS CONTENUS</p>
        <h1>Toutes mes vidéos.</h1>
        <p>Chaque passage conserve son émission et ses contenus courts au même endroit.</p>
      </div>
      <div class="library-summary" aria-label="Résumé de la bibliothèque">
        <div><strong id="contentCount">0</strong><span>vidéos</span></div>
        <div><strong id="shortCount">0</strong><span>shorts</span></div>
        <div><strong id="projectCount">0</strong><span>passages</span></div>
      </div>
    </section>

    <section class="content-section" aria-labelledby="libraryTitle">
      <header class="section-heading content-toolbar">
        <div><p class="eyebrow">BIBLIOTHÈQUE</p><h2 id="libraryTitle">Mes passages</h2><p id="resultLabel">Chargement de vos vidéos…</p></div>
        <div id="filters" class="filters" aria-label="Choisir le type de vidéo">
          <button class="active" type="button" data-filter="final">Émissions</button>
          <button type="button" data-filter="short">Shorts</button>
        </div>
      </header>
      <div id="contentGrid" class="passage-list" data-view="final" aria-live="polite"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script type="module" src="/espace-client/videos/videos.js?v=2"></script>
</body>
</html>
