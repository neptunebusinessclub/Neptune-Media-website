  <g filter="url(#softGlow)">
    <path d="M180 472V236C180 135 236 91 307 97C365 102 401 150 437 205L548 374C581 424 635 405 635 350V224" fill="none" stroke="url(#neptuneBody)" stroke-width="112" stroke-linecap="round" stroke-linejoin="round"/>
