<svg xmlns="http://www.w3.org/2000/svg" width="800" height="594" viewBox="0 0 800 594" role="img" aria-labelledby="title description">
  <title id="title">Neptune Media</title>
  <desc id="description">Logo Neptune Media multicolore sur fond transparent</desc>
  <defs>
    <linearGradient id="neptuneBody" x1="170" y1="105" x2="660" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4BE8FF"/>
      <stop offset="0.18" stop-color="#168CFF"/>
      <stop offset="0.38" stop-color="#2737FF"/>
      <stop offset="0.58" stop-color="#9B2CFF"/>
      <stop offset="0.76" stop-color="#F22DDB"/>
      <stop offset="0.89" stop-color="#FF5C72"/>
