    <path d="M180 472V236C180 135 236 91 307 97C365 102 401 150 437 205L548 374C581 424 635 405 635 350V224" fill="none" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="619" cy="87" r="20" fill="#FFFFFF" opacity="0.28"/>
