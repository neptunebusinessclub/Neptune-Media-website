name: Verify Neptune Production Copy

on:
  push:
    branches: [main]
    paths:
      - 'neptune-tv-media-cloudflare/src/public-router.js'
      - 'neptune-tv-media-cloudflare/public/home-live.js'
      - 'neptune-tv-media-cloudflare/public/landing-conversion.js'
      - 'neptune-tv-media-cloudflare/public/styles/neptune-streaming.css'
      - '.github/workflows/verify-neptune-copy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: verify-neptune-production-copy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify exact production content
        env:
          PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
        run: |
          set +e
          nonce="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          curl --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/?verify=$nonce" > /tmp/home.html
          curl --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/home-live.js?v=3&verify=$nonce" > /tmp/home-live.js
          curl --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/landing-conversion.js?v=4&verify=$nonce" > /tmp/landing.js
          curl --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/styles/neptune-streaming.css?v=9&verify=$nonce" > /tmp/streaming.css
          curl --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/direct/?verify=$nonce" > /tmp/direct.html

          export HOME_HAS_V4=false
          export HOME_HAS_V3=false
          export LIVE_COPY=false
          export OLD_COPY_ABSENT=false
          export CLAIM_24H_ABSENT=false
          export SHORTS_COMPACT=false
          export DIRECT_HERO_ABSENT=false

          grep -q '/landing-conversion.js?v=4' /tmp/home.html && export HOME_HAS_V4=true
          grep -q '/home-live.js?v=3' /tmp/home.html && export HOME_HAS_V3=true
          grep -q 'Votre expertise peut passer à l’antenne' /tmp/landing.js && grep -q 'Votre expertise peut passer à l’antenne' /tmp/home-live.js && export LIVE_COPY=true
          ! grep -q 'Neptune Media diffuse les émissions programmées' /tmp/landing.js && export OLD_COPY_ABSENT=true
          ! grep -q '24H/24' /tmp/home-live.js && export CLAIM_24H_ABSENT=true
          grep -q 'Compact shorts and avatar-first headings v9' /tmp/streaming.css && grep -q 'flex-wrap:nowrap' /tmp/streaming.css && export SHORTS_COMPACT=true
          ! grep -q '<h1>Neptune Media, à l’antenne' /tmp/direct.html && export DIRECT_HERO_ABSENT=true

          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          checks = {
              'home_references_landing_v4': os.environ['HOME_HAS_V4'] == 'true',
              'home_references_home_live_v3': os.environ['HOME_HAS_V3'] == 'true',
              'new_live_copy_present': os.environ['LIVE_COPY'] == 'true',
              'old_live_copy_absent': os.environ['OLD_COPY_ABSENT'] == 'true',
              '24h_claim_absent': os.environ['CLAIM_24H_ABSENT'] == 'true',
              'compact_horizontal_shorts_css': os.environ['SHORTS_COMPACT'] == 'true',
              'direct_marketing_h1_absent': os.environ['DIRECT_HERO_ABSENT'] == 'true',
          }
          report = {
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'ready': all(checks.values()),
              'checks': checks,
          }
          with open('copy-production-verification.json', 'w', encoding='utf-8') as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2)
              handle.write('\n')
          PY

      - name: Record verification result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add copy-production-verification.json
          git commit -m 'chore: record exact production copy verification [skip ci]' || true
          git pull --rebase origin main || true
          git push
