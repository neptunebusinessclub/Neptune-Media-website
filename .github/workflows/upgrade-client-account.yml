name: Upgrade permanent client account

on:
  push:
    paths:
      - .github/workflows/upgrade-client-account.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build base client portal
        shell: bash
        run: |
          awk "/python3 <<'PY'/{flag=1;next} /^          PY$/{flag=0} flag{sub(/^          /,\"\"); print}" .github/workflows/build-client-portal.yml > /tmp/build_portal.py
          python3 /tmp/build_portal.py

      - name: Upgrade to permanent multi-order account
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('neptune-tv-media-cloudflare')
          store_path = root / 'src/store.js'
          index_path = root / 'src/index.js'
          portal_html_path = root / 'public/espace-client/index.html'
          portal_js_path = root / 'public/espace-client/client.js'
          portal_css_path = root / 'public/espace-client/client.css'

          store = store_path.read_text()
          index = index_path.read_text()
          html = portal_html_path.read_text()
          js = portal_js_path.read_text()
          css = portal_css_path.read_text()

          # One permanent client account, many orders/projects.
          if 'stripe_payment_id TEXT' not in store:
              anchor = "        updated_at TEXT NOT NULL\n      );\n      CREATE TABLE IF NOT EXISTS client_steps"
              replacement = "        updated_at TEXT NOT NULL,\n        stripe_payment_id TEXT,\n        payment_status TEXT NOT NULL DEFAULT 'pending',\n        amount_total INTEGER,\n        currency TEXT NOT NULL DEFAULT 'eur',\n        product_code TEXT NOT NULL DEFAULT '',\n        preparation_url TEXT NOT NULL DEFAULT ''\n      );\n      CREATE UNIQUE INDEX IF NOT EXISTS idx_client_projects_stripe_payment ON client_projects(stripe_payment_id) WHERE stripe_payment_id IS NOT NULL;\n      CREATE TABLE IF NOT EXISTS client_steps"
              if anchor not in store:
                  raise SystemExit('client_projects schema anchor missing')
              store = store.replace(anchor, replacement, 1)

          if "'/client/order-upsert'" not in store:
              anchor = "    if (url.pathname === '/client/admin-save' && method === 'POST') return this.clientAdminSave(body);\n"
              insert = anchor + "    if (url.pathname === '/client/order-upsert' && method === 'POST') return this.clientOrderUpsert(body);\n"
              if anchor not in store:
                  raise SystemExit('client admin route anchor missing')
              store = store.replace(anchor, insert, 1)

          if 'async clientOrderUpsert(body)' not in store:
              marker = '  async clientAdminSave(body) {'
              method = r'''  async clientOrderUpsert(body) {
    const payload = body && typeof body === 'object' ? body : {};
    const email = normalizeEmail(payload.email);
    const stripePaymentId = sanitizeText(payload.stripePaymentId, 180);
    if (!email || !stripePaymentId) return json({ error: 'invalid_order' }, 400);
    const now = new Date().toISOString();
    let client = this.sql.exec('SELECT id FROM clients WHERE email=?', email).toArray()[0];
    if (!client) {
      client = { id: crypto.randomUUID() };
      this.sql.exec(
        'INSERT INTO clients (id,email,full_name,company,active,created_at,updated_at) VALUES (?,?,?,?,1,?,?)',
        client.id, email, sanitizeText(payload.fullName, 120), sanitizeText(payload.company, 160), now, now,
      );
    } else {
      this.sql.exec(
        `UPDATE clients SET full_name=CASE WHEN ?<>'' THEN ? ELSE full_name END,
         company=CASE WHEN ?<>'' THEN ? ELSE company END,active=1,updated_at=? WHERE id=?`,
        sanitizeText(payload.fullName,120), sanitizeText(payload.fullName,120),
        sanitizeText(payload.company,160), sanitizeText(payload.company,160), now, client.id,
      );
    }
    let order = this.sql.exec('SELECT id FROM client_projects WHERE stripe_payment_id=?', stripePaymentId).toArray()[0];
    if (!order) {
      order = { id: crypto.randomUUID() };
      this.sql.exec(
        `INSERT INTO client_projects
         (id,client_id,title,format,status,appointment_at,filming_at,next_action,created_at,updated_at,
          stripe_payment_id,payment_status,amount_total,currency,product_code,preparation_url)
         VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)`,
        order.id, client.id, sanitizeText(payload.title,180) || 'Passage Neptune Media',
        sanitizeText(payload.format,80), 'reservation_confirmed', null, null,
        'Choisir ou confirmer votre rendez-vous', now, now, stripePaymentId,
        sanitizeText(payload.paymentStatus,40) || 'paid', Number(payload.amountTotal || 0),
        sanitizeText(payload.currency,10) || 'eur', sanitizeText(payload.productCode,80),
        sanitizeText(payload.preparationUrl,500),
      );
      const steps = [
        ['payment','Paiement confirmé'],['reservation','Réservation enregistrée'],['appointment','Rendez-vous confirmé'],
        ['preparation','Préparation de l’interview'],['filming','Tournage planifié'],['shot','Tournage réalisé'],
        ['editing','Montage en cours'],['approval','Validation demandée'],['delivery','Livrables disponibles'],['done','Projet terminé'],
      ];
      for (let i = 0; i < steps.length; i++) {
        this.sql.exec(
          'INSERT INTO client_steps (id,project_id,step_key,label,state,display_order,completed_at,note) VALUES (?,?,?,?,?,?,?,?)',
          crypto.randomUUID(), order.id, steps[i][0], steps[i][1], i < 2 ? 'done' : (i === 2 ? 'current' : 'pending'),
          (i + 1) * 10, i < 2 ? now : null, '',
        );
      }
    } else {
      this.sql.exec(
        `UPDATE client_projects SET payment_status=?,amount_total=?,currency=?,updated_at=? WHERE id=?`,
        sanitizeText(payload.paymentStatus,40) || 'paid', Number(payload.amountTotal || 0),
        sanitizeText(payload.currency,10) || 'eur', now, order.id,
      );
    }
    return json({ ok: true, clientId: client.id, orderId: order.id, created: true });
  }

'''
              if marker not in store:
                  raise SystemExit('clientAdminSave anchor missing')
              store = store.replace(marker, method + marker, 1)

          # Enrich client session payload with order/payment fields.
          old_select = "`SELECT id,title,format,status,appointment_at AS appointmentAt,filming_at AS filmingAt,\n              next_action AS nextAction,created_at AS createdAt,updated_at AS updatedAt\n       FROM client_projects WHERE client_id=? ORDER BY created_at DESC`"
          new_select = "`SELECT id,title,format,status,appointment_at AS appointmentAt,filming_at AS filmingAt,\n              next_action AS nextAction,created_at AS createdAt,updated_at AS updatedAt,\n              stripe_payment_id AS stripePaymentId,payment_status AS paymentStatus,amount_total AS amountTotal,\n              currency,product_code AS productCode,preparation_url AS preparationUrl\n       FROM client_projects WHERE client_id=? ORDER BY created_at DESC`"
          if old_select in store:
              store = store.replace(old_select, new_select, 1)

          # Signed reservation webhook creates a new order on the existing account.
          if "'/api/webhooks/client-order'" not in index:
              anchor = "      if (url.pathname === '/api/webhooks/conversion' && request.method === 'POST') {"
              route = r'''      if (url.pathname === '/api/webhooks/client-order' && request.method === 'POST') {
        const signature = request.headers.get('X-Neptune-Webhook-Secret') || '';
        if (!env.CONVERSION_WEBHOOK_SECRET || !timingSafeEqual(signature, env.CONVERSION_WEBHOOK_SECRET)) {
          return withSecurity(json({ error: 'unauthorized' }, 401));
        }
        const payload = await request.json().catch(() => ({}));
        const response = await callStore(studio, '/client/order-upsert', payload);
        const result = await response.json().catch(() => ({}));
        if (!response.ok) return withSecurity(json(result, response.status));
        if (payload.email && env.RESEND_API_KEY) {
          await sendClientOrderEmail(env, request.url, payload).catch((error) => console.error('client_order_email_failed', error));
        }
        return withSecurity(json(result));
      }

'''
              if anchor not in index:
                  raise SystemExit('conversion webhook anchor missing')
              index = index.replace(anchor, route + anchor, 1)

          if 'async function sendClientOrderEmail' not in index:
              anchor = 'async function sendResetEmail(env, requestUrl, token) {'
              helper = r'''async function sendClientOrderEmail(env, requestUrl, payload) {
  const origin = new URL(requestUrl).origin;
  const portalUrl = `${origin}/espace-client/?email=${encodeURIComponent(String(payload.email || '').trim().toLowerCase())}`;
  const from = env.AUTH_FROM_EMAIL || 'Neptune Media <onboarding@resend.dev>';
  const title = String(payload.title || payload.format || 'Votre passage Neptune Media');
  const response = await fetch('https://api.resend.com/emails', {
    method: 'POST',
    headers: { Authorization: `Bearer ${env.RESEND_API_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      from,
      to: [String(payload.email || '')],
      subject: 'Votre réservation Neptune Media est confirmée',
      html: `<div style="font-family:Arial,sans-serif;max-width:620px;margin:auto;padding:32px"><h1>Votre espace Neptune Media est prêt</h1><p>Votre commande <strong>${title}</strong> a été ajoutée à votre compte client permanent.</p><p>Vous pourrez y préparer l’interview, suivre chaque étape, retrouver vos anciens passages et récupérer vos livrables.</p><p><a href="${portalUrl}" style="display:inline-block;padding:14px 22px;border-radius:999px;background:#5b42ff;color:#fff;text-decoration:none;font-weight:700">Accéder à mon espace</a></p></div>`,
      text: `Votre réservation ${title} est confirmée. Accédez à votre espace permanent : ${portalUrl}`,
    }),
  });
  if (!response.ok) throw new Error(`resend_${response.status}`);
  return { ok: true };
}

'''
              if anchor not in index:
                  raise SystemExit('sendResetEmail anchor missing')
              index = index.replace(anchor, helper + anchor, 1)

          # Permanent-account wording and direct reorder area.
          html = html.replace('Mon projet Neptune Media', 'Mon espace Neptune Media')
          html = html.replace('Votre projet, simplement.', 'Tous vos passages Neptune Media, au même endroit.')

          if 'function reorderBlock' not in js:
              marker = 'function renderProject('
              helper = r'''function reorderBlock() {
  return `<section class="reorder-card"><div><p class="eyebrow">NOUVEAU PASSAGE</p><h2>Réserver à nouveau</h2><p>Votre prochaine commande sera automatiquement ajoutée à ce même compte.</p></div><div class="reorder-actions"><a class="btn btn-primary" href="https://book.stripe.com/dRm14nfpz8r04lo7um73G09" target="_blank" rel="noopener">Concept Libre</a><a class="btn" href="https://buy.stripe.com/8x214n2CN22C5ps9Cu73G0a" target="_blank" rel="noopener">Concept Hors Norme</a></div></section>`;
}

'''
              if marker in js:
                  js = js.replace(marker, helper + marker, 1)

          # Inject reorder card after project list render when possible.
          patterns = [
              (r"(\$\('#projects'\)\.innerHTML\s*=\s*[^;]+;)", r"\1\n  $('#projects').insertAdjacentHTML('afterend', reorderBlock());"),
              (r"(document\.querySelector\('#projects'\)\.innerHTML\s*=\s*[^;]+;)", r"\1\n  document.querySelector('#projects').insertAdjacentHTML('afterend', reorderBlock());"),
          ]
          if 'insertAdjacentHTML(\'afterend\', reorderBlock())' not in js:
              for pattern, repl in patterns:
                  js2, count = re.subn(pattern, repl, js, count=1)
                  if count:
                      js = js2
                      break

          if '.reorder-card' not in css:
              css += "\n.reorder-card{display:flex;justify-content:space-between;gap:24px;align-items:center;margin:28px 0;padding:26px;border:1px solid rgba(255,255,255,.12);border-radius:24px;background:rgba(255,255,255,.05)}.reorder-card h2{margin:.25rem 0}.reorder-actions{display:flex;gap:12px;flex-wrap:wrap}@media(max-width:720px){.reorder-card{align-items:flex-start;flex-direction:column}.reorder-actions{width:100%}.reorder-actions .btn{flex:1;text-align:center}}\n"

          store_path.write_text(store)
          index_path.write_text(index)
          portal_html_path.write_text(html)
          portal_js_path.write_text(js)
          portal_css_path.write_text(css)
          PY

      - name: Validate and deploy
        run: |
          cd neptune-tv-media-cloudflare
          npm install --package-lock=false --registry=https://registry.npmjs.org
          npm run check
          npx wrangler deploy
          curl --fail --silent --show-error https://neptune-media-webtv.neptunebusinessclub.workers.dev/espace-client/ | grep -q 'Neptune'

      - name: Commit implementation
        shell: bash
        run: |
          rm -f .github/workflows/build-client-portal.yml
          rm -f .github/workflows/upgrade-client-account.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add permanent multi-order client account"
          git push
