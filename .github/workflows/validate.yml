name: Validate Neptune Media

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check JavaScript syntax
        run: npm run check
      - name: Validate Wrangler configuration
        run: npx wrangler deploy --dry-run --config wrangler.jsonc
