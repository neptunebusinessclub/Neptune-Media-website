name: Validate Neptune Media

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install active worker dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Validate active Cloudflare Worker
        run: npm run verify
