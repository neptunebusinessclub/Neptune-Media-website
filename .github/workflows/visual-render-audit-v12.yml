name: Visual Render Audit v12

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/visual-render-audit-v12.yml'
      - 'visual-audit-v12-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-visual-render-audit-v12
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright Chromium
        run: |
          mkdir -p /tmp/neptune-v12
          cd /tmp/neptune-v12
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium

      - name: Wait for verified visual production
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 24); do
            nonce="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl --fail --silent --show-error -H 'Cache-Control: no-cache' "$BASE_URL/?visual_v12=$nonce" > /tmp/home.html \
              && grep -q '/styles/visual-polish-v11.css?v=1' /tmp/home.html \
              && grep -q '/visual-polish-v11.js?v=1' /tmp/home.html; then
              ready=true
              break
            fi
            sleep 10
          done
          test "$ready" = "true"

      - name: Record audit run before capture
        run: |
          rm -rf visual-audit/v12
          mkdir -p visual-audit/v12
          printf '{"run_id":%s,"artifact_name":"neptune-visual-audit-v12-%s","source_sha":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_RUN_ID" "$GITHUB_SHA" > visual-audit/v12/artifact-run.json

      - name: Capture each page section and modal
        continue-on-error: true
        run: |
          cat > /tmp/neptune-v12/audit.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs/promises';
          import path from 'node:path';

          const base = process.env.BASE_URL;
          const out = path.resolve(process.cwd(), 'visual-audit/v12');
          const viewports = [
            { name: 'desktop-1440', width: 1440, height: 1000 },
            { name: 'laptop-1280', width: 1280, height: 800 },
            { name: 'tablet-834', width: 834, height: 1112 },
            { name: 'mobile-390', width: 390, height: 844 },
            { name: 'mobile-360', width: 360, height: 800 },
          ];
          const pages = [
            {
              name: 'home', url: '/', sections: [
                ['hero', '.voice-hero'], ['proof-content', '.proof-by-content'], ['problem', '#probleme'],
                ['solution', '#solution'], ['formats', '#formats'], ['experience', '#experience'],
                ['faq', '#questions'], ['final', '.voice-final'], ['footer', '.footer'],
              ],
            },
            {
              name: 'emissions', url: '/emissions/', sections: [
                ['hero', '.catalogue-hero'], ['search', '.seo-search-panel'],
                ['episodes', '[data-media-section="episode"]'], ['shorts', '[data-media-section="short"]'], ['footer', '.public-footer'],
              ],
            },
            {
              name: 'direct', url: '/direct/', sections: [
                ['channel', '.live-channel,.live-empty-panel'], ['related', '.related'], ['footer', '.public-footer'],
              ],
            },
          ];
          const report = { generatedAt: new Date().toISOString(), base, captures: [], issues: [] };
          const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });

          const identify = (element) => element.id ? `#${element.id}` : `${element.tagName.toLowerCase()}${[...element.classList].slice(0, 3).map((item) => `.${item}`).join('')}`;
          const safeShot = async (target, file, options = {}) => {
            try {
              await target.screenshot({ path: path.join(out, file), type: 'jpeg', quality: 58, animations: 'disabled', ...options });
              return true;
            } catch (error) {
              report.issues.push({ severity: 'error', type: 'screenshot', file, message: String(error) });
              return false;
            }
          };

          for (const viewport of viewports) {
            const context = await browser.newContext({ viewport: { width: viewport.width, height: viewport.height }, reducedMotion: 'reduce' });
            for (const pageDef of pages) {
              const page = await context.newPage();
              const httpErrors = [];
              const consoleErrors = [];
              page.on('response', (response) => {
                if (response.status() >= 400) httpErrors.push({ status: response.status(), url: response.url(), resourceType: response.request().resourceType() });
              });
              page.on('console', (message) => {
                if (message.type() === 'error' && !message.text().startsWith('Failed to load resource:')) consoleErrors.push(message.text());
              });

              let pageStatus = 0;
              try {
                const response = await page.goto(`${base}${pageDef.url}?audit_v12=${Date.now()}`, { waitUntil: 'domcontentloaded', timeout: 60000 });
                pageStatus = response?.status() || 0;
                await page.waitForLoadState('networkidle', { timeout: 15000 }).catch(() => {});
                await page.waitForTimeout(2600);
              } catch (error) {
                report.issues.push({ severity: 'error', viewport: viewport.name, page: pageDef.name, type: 'navigation', message: String(error) });
              }

              const diagnostics = await page.evaluate(() => {
                const visible = (element) => {
                  const style = getComputedStyle(element);
                  const rect = element.getBoundingClientRect();
                  return style.display !== 'none' && style.visibility !== 'hidden' && Number(style.opacity) !== 0 && rect.width > 0 && rect.height > 0;
                };
                const root = document.documentElement;
                const overflow = Math.max(root.scrollWidth, document.body.scrollWidth) - innerWidth;
                const brokenImages = [...document.images].filter((image) => visible(image) && image.complete && image.naturalWidth === 0).map((image) => image.currentSrc || image.src);
                const clippedText = [...document.querySelectorAll('h1,h2,h3,p,blockquote,button,a,span')]
                  .filter((element) => visible(element) && !element.classList.contains('sr-only') && element.getAttribute('aria-hidden') !== 'true' && (element.textContent || '').trim().length > 8)
                  .filter((element) => {
                    const style = getComputedStyle(element);
                    if (['auto', 'scroll'].includes(style.overflowX) || ['auto', 'scroll'].includes(style.overflowY)) return false;
                    if (style.webkitLineClamp && style.webkitLineClamp !== 'none') return false;
                    if (element.closest('.media-card-copy,.seo-card-copy')) return false;
                    return element.scrollWidth > element.clientWidth + 8 || element.scrollHeight > element.clientHeight + 8;
                  })
                  .slice(0, 40)
                  .map((element) => ({ selector: identify(element), text: element.textContent.trim().slice(0, 140), client: [element.clientWidth, element.clientHeight], scroll: [element.scrollWidth, element.scrollHeight] }));
                const offscreen = [...document.querySelectorAll('main *')].filter(visible).filter((element) => {
                  const rect = element.getBoundingClientRect();
                  return !element.closest('[data-rail-track],.seo-grid-shorts,.media-filter-row') && (rect.left < -3 || rect.right > innerWidth + 3) && getComputedStyle(element).position !== 'fixed';
                }).slice(0, 40).map((element) => ({ selector: identify(element), text: (element.textContent || '').trim().slice(0, 90) }));
                return {
                  visualPolish: document.documentElement.dataset.visualPolish || '',
                  overflow,
                  brokenImages,
                  clippedText,
                  offscreen,
                  duplicateProgramPills: document.querySelectorAll('.catalogue-page > .program-pills').length,
                  legacyHomepageBlocks: document.body.matches('[data-home-structure="conversion-voice-v10"]') ? document.querySelectorAll('.media-discovery,.catalog-tools,#livrables').length : 0,
                  heroAspect: document.querySelector('.hero-media') ? getComputedStyle(document.querySelector('.hero-media')).aspectRatio : '',
                };
              });

              const prefix = `${pageDef.name}-${viewport.name}`;
              await safeShot(page, `${prefix}-fold.jpg`, { fullPage: false });
              for (const [sectionName, selector] of pageDef.sections) {
                const section = page.locator(selector).first();
                if (await section.count() && await section.isVisible().catch(() => false)) {
                  await section.scrollIntoViewIfNeeded().catch(() => {});
                  await page.waitForTimeout(120);
                  await safeShot(section, `${prefix}-${sectionName}.jpg`);
                }
              }

              if (pageDef.name === 'home') {
                for (const [kind, selector] of [['episode', '#dynamicCatalog [data-episode-id], #dynamicCatalog [data-video-src]'], ['short', '#shortsCatalog [data-episode-id], #shortsCatalog [data-video-src]']]) {
                  const card = page.locator(selector).first();
                  if (await card.count()) {
                    await card.scrollIntoViewIfNeeded().catch(() => {});
                    await card.click().catch(() => {});
                    await page.waitForTimeout(800);
                    const modal = page.locator('[data-video-modal].is-open');
                    if (await modal.count()) {
                      await safeShot(page, `${prefix}-${kind}-modal.jpg`, { fullPage: false });
                      await page.locator('[data-video-close]').click().catch(() => {});
                    }
                  }
                }
              }

              const capture = { viewport, page: pageDef.name, pageStatus, diagnostics, httpErrors, consoleErrors };
              report.captures.push(capture);
              if (pageStatus >= 400 || pageStatus === 0) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageDef.name, type: 'http-page', message: `HTTP ${pageStatus}` });
              if (diagnostics.visualPolish !== 'v11') report.issues.push({ severity: 'error', viewport: viewport.name, page: pageDef.name, type: 'missing-polish', message: diagnostics.visualPolish || 'absent' });
              if (diagnostics.overflow > 3) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageDef.name, type: 'horizontal-overflow', message: `${diagnostics.overflow}px` });
              if (diagnostics.duplicateProgramPills) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageDef.name, type: 'duplicate-filters', message: String(diagnostics.duplicateProgramPills) });
              if (diagnostics.legacyHomepageBlocks) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageDef.name, type: 'legacy-home-blocks', message: String(diagnostics.legacyHomepageBlocks) });
              for (const src of diagnostics.brokenImages) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageDef.name, type: 'broken-image', message: src });
              for (const issue of diagnostics.clippedText) report.issues.push({ severity: 'warning', viewport: viewport.name, page: pageDef.name, type: 'clipped-text', ...issue });
              for (const issue of diagnostics.offscreen) report.issues.push({ severity: 'warning', viewport: viewport.name, page: pageDef.name, type: 'offscreen-element', ...issue });
              for (const issue of httpErrors) report.issues.push({ severity: 'warning', viewport: viewport.name, page: pageDef.name, type: 'http-resource', message: `${issue.status} ${issue.resourceType} ${issue.url}` });
              for (const issue of consoleErrors) report.issues.push({ severity: 'warning', viewport: viewport.name, page: pageDef.name, type: 'console-error', message: issue });
              await page.close();
            }
            await context.close();
          }
          await browser.close();

          const counts = report.issues.reduce((result, issue) => { result[issue.severity] = (result[issue.severity] || 0) + 1; return result; }, {});
          await fs.writeFile(path.join(out, 'audit.json'), JSON.stringify(report, null, 2));
          const rows = report.issues.slice(0, 180).map((issue) => `| ${issue.severity} | ${issue.viewport || '—'} | ${issue.page || '—'} | ${issue.type} | ${(issue.message || issue.text || issue.selector || '').replaceAll('|', '\\|')} |`).join('\n');
          await fs.writeFile(path.join(out, 'README.md'), `# Audit visuel Neptune Media v12\n\nGénéré : ${report.generatedAt}\n\n- Captures analysées : ${report.captures.length}\n- Erreurs structurelles : ${counts.error || 0}\n- Points à examiner : ${counts.warning || 0}\n\n| Niveau | Écran | Page | Type | Détail |\n|---|---|---|---|---|\n${rows || '| — | — | — | — | Aucun problème détecté |'}\n`);
          JS
          node /tmp/neptune-v12/audit.mjs

      - name: Upload complete visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neptune-visual-audit-v12-${{ github.run_id }}
          path: visual-audit/v12
          if-no-files-found: error
          retention-days: 14

      - name: Commit report and screenshot evidence
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add visual-audit/v12
          git commit -m 'chore: capture Neptune v12 section visual audit [skip ci]' || true
          git pull --rebase origin main || true
          git push
