name: Check render polish production

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/check-render-polish-production.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check production markers
        shell: bash
        run: |
          set +e
          home_status=$(curl --silent --show-error --output /tmp/home.html --write-out '%{http_code}' "$PUBLIC_URL/")
          css_status=$(curl --silent --show-error --output /tmp/css.txt --write-out '%{http_code}' "$PUBLIC_URL/styles/neptune-streaming.css")
          app_status=$(curl --silent --show-error --output /tmp/app.txt --write-out '%{http_code}' "$PUBLIC_URL/app.js")
          ux_status=$(curl --silent --show-error --output /tmp/ux.txt --write-out '%{http_code}' "$PUBLIC_URL/ux-aida.js")
          direct_status=$(curl --silent --show-error --output /tmp/direct.html --write-out '%{http_code}' "$PUBLIC_URL/direct/")
          polish=false; grep -q 'data-render-polish="v4"' /tmp/home.html && polish=true
          live=false; grep -q 'data-home-live' /tmp/home.html && live=true
          empty=false; grep -q 'data-empty-reset' /tmp/home.html && empty=true
          css=false; grep -q 'Render polish v4' /tmp/css.txt && css=true
          searchable=false; grep -q 'data-search' /tmp/app.txt && searchable=true
          refresh=false; grep -q 'neptune:search-refresh' /tmp/ux.txt && refresh=true
          direct=false; grep -q 'live-empty-panel\|data-live-available="true"' /tmp/direct.html && direct=true
          ready=false
          if test "$home_status" = 200 -a "$css_status" = 200 -a "$app_status" = 200 -a "$ux_status" = 200 -a "$direct_status" = 200 -a "$polish" = true -a "$live" = true -a "$empty" = true -a "$css" = true -a "$searchable" = true -a "$refresh" = true -a "$direct" = true; then ready=true; fi
          HOME="$home_status" CSS_STATUS="$css_status" APP_STATUS="$app_status" UX_STATUS="$ux_status" DIRECT_STATUS="$direct_status" POLISH="$polish" LIVE="$live" EMPTY="$empty" CSS="$css" SEARCHABLE="$searchable" REFRESH="$refresh" DIRECT="$direct" READY="$ready" python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          truth=lambda name: os.environ[name]=='true'
          report={
            'checked_at':datetime.now(timezone.utc).isoformat(),
            'ready':truth('READY'),
            'statuses':{'home':os.environ['HOME'],'css':os.environ['CSS_STATUS'],'app':os.environ['APP_STATUS'],'ux':os.environ['UX_STATUS'],'direct':os.environ['DIRECT_STATUS']},
            'markers':{'polish':truth('POLISH'),'home_live':truth('LIVE'),'empty_state':truth('EMPTY'),'css':truth('CSS'),'searchable_cards':truth('SEARCHABLE'),'search_refresh':truth('REFRESH'),'direct_states':truth('DIRECT')}
          }
          with open('render-polish-production-check.json','w',encoding='utf-8') as f:
            json.dump(report,f,ensure_ascii=False,indent=2);f.write('\n')
          PY
      - name: Record check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add render-polish-production-check.json
          git commit -m "chore: record render polish production check [skip ci]" || true
          git push
