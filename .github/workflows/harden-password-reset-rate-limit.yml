name: Harden Studio password reset rate limiting

on:
  push:
    paths:
      - .github/workflows/harden-password-reset-rate-limit.yml
  workflow_dispatch:

permissions:
  contents: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  patch-test-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply deterministic reset rate-limit patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path('neptune-tv-media-cloudflare/src')
          index_path = root / 'index.js'
          store_path = root / 'store.js'
          index = index_path.read_text()
          store = store_path.read_text()

          old = """        const email = String(payload.email || '').trim().toLowerCase();
        const resultResponse = await callStore(studio, '/auth/request-reset', { email });"""
          new = """        const email = String(payload.email || '').trim().toLowerCase();
        const attemptKey = await loginAttemptKey(request);
        const resultResponse = await callStore(studio, '/auth/request-reset', { email, attemptKey });"""
          if old in index:
              index = index.replace(old, new, 1)
          elif "const attemptKey = await loginAttemptKey(request);\n        const resultResponse = await callStore(studio, '/auth/request-reset', { email, attemptKey });" not in index:
              raise SystemExit('request-reset worker anchor missing')

          schema_anchor = """      CREATE TABLE IF NOT EXISTS password_resets (
        id TEXT PRIMARY KEY,"""
          schema_insert = """      CREATE TABLE IF NOT EXISTS reset_attempts (
        key TEXT PRIMARY KEY,
        count INTEGER NOT NULL,
        first_at TEXT NOT NULL,
        last_at TEXT NOT NULL
      );
      CREATE TABLE IF NOT EXISTS password_resets (
        id TEXT PRIMARY KEY,"""
          if 'CREATE TABLE IF NOT EXISTS reset_attempts' not in store:
              if schema_anchor not in store:
                  raise SystemExit('reset schema anchor missing')
              store = store.replace(schema_anchor, schema_insert, 1)

          old_method = """  async requestPasswordReset(body) {
    const email = normalizeEmail(body.email);
    if (email !== STUDIO_EMAIL) return json({ ok: true });
    const rawToken = randomToken(32);"""
          new_method = """  async requestPasswordReset(body) {
    const email = normalizeEmail(body.email);
    const attemptKey = sanitizeText(body.attemptKey, 180) || 'unknown';
    if (email !== STUDIO_EMAIL) return json({ ok: true });
    if (this.isResetBlocked(attemptKey)) return json({ ok: true, throttled: true });
    this.recordResetRequest(attemptKey);
    const rawToken = randomToken(32);"""
          if old_method in store:
              store = store.replace(old_method, new_method, 1)
          elif 'if (this.isResetBlocked(attemptKey))' not in store:
              raise SystemExit('requestPasswordReset anchor missing')

          helper_anchor = """  async resetPassword(body) {"""
          helper = """  isResetBlocked(key) {
    const now = Date.now();
    const windowMs = 15 * 60 * 1000;
    const row = this.sql.exec('SELECT count,first_at FROM reset_attempts WHERE key=?', key).toArray()[0];
    if (!row) return false;
    const firstAt = new Date(row.first_at).getTime();
    if (!Number.isFinite(firstAt) || now - firstAt >= windowMs) {
      this.sql.exec('DELETE FROM reset_attempts WHERE key=?', key);
      return false;
    }
    return Number(row.count) >= 3;
  }

  recordResetRequest(key) {
    const now = new Date();
    const windowMs = 15 * 60 * 1000;
    const row = this.sql.exec('SELECT count,first_at FROM reset_attempts WHERE key=?', key).toArray()[0];
    const firstAt = row ? new Date(row.first_at).getTime() : NaN;
    if (!row || !Number.isFinite(firstAt) || now.getTime() - firstAt >= windowMs) {
      this.sql.exec(
        'INSERT OR REPLACE INTO reset_attempts (key,count,first_at,last_at) VALUES (?,?,?,?)',
        key, 1, now.toISOString(), now.toISOString(),
      );
    } else {
      this.sql.exec('UPDATE reset_attempts SET count=count+1,last_at=? WHERE key=?', now.toISOString(), key);
    }
    this.sql.exec('DELETE FROM reset_attempts WHERE last_at<?', new Date(now.getTime() - 24 * 60 * 60 * 1000).toISOString());
  }

  async resetPassword(body) {"""
          if '  isResetBlocked(key) {' not in store:
              if helper_anchor not in store:
                  raise SystemExit('reset helper anchor missing')
              store = store.replace(helper_anchor, helper, 1)

          index_path.write_text(index)
          store_path.write_text(store)
          PY

      - name: Install and validate
        run: |
          cd neptune-tv-media-cloudflare
          npm install --package-lock=false --registry=https://registry.npmjs.org
          npm run check

      - name: Deploy Cloudflare Worker
        run: |
          cd neptune-tv-media-cloudflare
          npx wrangler deploy

      - name: Verify public and administrative routes
        shell: bash
        run: |
          base='https://neptune-media-webtv.neptunebusinessclub.workers.dev'
          curl --fail --silent --show-error "$base/" | grep -qi 'Neptune'
          curl --fail --silent --show-error "$base/direct/" | grep -qi 'Neptune'
          curl --fail --silent --show-error "$base/studio/" | grep -qi 'Neptune'
          curl --fail --silent --show-error "$base/llms.txt" | grep -qi 'Neptune'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' "$base/api/admin/state")" = '401'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' "$base/api/auth/status")" = '401'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' "$base/api/health")" = '200'

      - name: Commit implementation and deployment marker
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add neptune-tv-media-cloudflare/src/index.js neptune-tv-media-cloudflare/src/store.js
          if ! git diff --cached --quiet; then
            git commit -m 'fix: enforce password reset email rate limit [skip ci]'
          fi
          source_sha="$(git rev-parse HEAD)"
          printf '{"status":"success","source_sha":"%s","deployed_at":"%s","url":"https://neptune-media-webtv.neptunebusinessclub.workers.dev"}\n' "$source_sha" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > deployment-status.json
          git add deployment-status.json
          git commit -m 'chore: record successful deployment [skip ci]' || true
          git push origin HEAD:main
