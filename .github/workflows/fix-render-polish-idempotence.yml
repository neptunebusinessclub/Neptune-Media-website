name: Fix Render Polish Idempotence

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-render-polish-idempotence.yml'
      - 'scripts/apply-render-polish-v8.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make replacement helper idempotent
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/apply-render-polish-v8.py')
          text = path.read_text(encoding='utf-8')
          old = '    for old, new in replacements:\n        text = text.replace(old, new)'
          new = '    for old, new in replacements:\n        if new not in text:\n            text = text.replace(old, new)'
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          PY

      - name: Persist fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/apply-render-polish-v8.py
          git commit -m 'fix: prevent repeated render-polish declarations [skip ci]' || true
          git pull --rebase origin main || true
          git push
