name: Install Exact Neptune Backstage Media

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-visual-artifact.yml'

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download exact supplied media
        run: |
          set -euxo pipefail
          mkdir -p .tmp-backstage neptune-tv-media-cloudflare/public/assets/backstage
          curl -fL 'https://drive.usercontent.google.com/download?id=1WlyVRXsKSxMsDov2mapvWhEoak5e8y57&export=download&confirm=t' -o .tmp-backstage/studio.mov
          curl -fL 'https://drive.usercontent.google.com/download?id=16EQ9ZB_bX6l5RxdWr4KURGhKgLKjYoCs&export=download&confirm=t' -o .tmp-backstage/team.mov
          curl -fL 'https://drive.usercontent.google.com/download?id=1zNuZx-QK9qeZvxfwHkHoQ4s-cZs68Ls-&export=download&confirm=t' -o .tmp-backstage/control-room.mov
          curl -fL 'https://drive.usercontent.google.com/download?id=1QT_UW8AWvBtv48lRdlgNKER0dmis8upO&export=download&confirm=t' -o .tmp-backstage/connexio.png
          file .tmp-backstage/*

      - name: Convert for browser playback
        run: |
          set -euxo pipefail
          OUT=neptune-tv-media-cloudflare/public/assets/backstage
          COMMON='scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black,fps=24'
          ffmpeg -y -i .tmp-backstage/studio.mov -an -vf "$COMMON" -c:v libx264 -profile:v high -level 4.0 -preset medium -crf 26 -pix_fmt yuv420p -movflags +faststart "$OUT/studio-preparation.mp4"
          ffmpeg -y -i .tmp-backstage/team.mov -an -vf "$COMMON" -c:v libx264 -profile:v high -level 4.0 -preset medium -crf 26 -pix_fmt yuv420p -movflags +faststart "$OUT/team-preview.mp4"
          ffmpeg -y -i .tmp-backstage/control-room.mov -an -vf "$COMMON" -c:v libx264 -profile:v high -level 4.0 -preset medium -crf 26 -pix_fmt yuv420p -movflags +faststart "$OUT/control-room.mp4"
          ffmpeg -y -i .tmp-backstage/connexio.png -vf "scale='min(1600,iw)':-2" -c:v libwebp -quality 82 -compression_level 6 "$OUT/connexio-team.webp"
          ffmpeg -y -ss 0.5 -i "$OUT/studio-preparation.mp4" -frames:v 1 -vf scale=720:-2 -c:v libwebp -quality 82 "$OUT/studio-preparation.webp"
          ffmpeg -y -ss 0.5 -i "$OUT/team-preview.mp4" -frames:v 1 -vf scale=720:-2 -c:v libwebp -quality 82 "$OUT/team-preview.webp"
          ffmpeg -y -ss 0.5 -i "$OUT/control-room.mp4" -frames:v 1 -vf scale=720:-2 -c:v libwebp -quality 82 "$OUT/control-room.webp"

      - name: Commit exact media assets
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add neptune-tv-media-cloudflare/public/assets/backstage
          git commit -m 'Add exact supplied Neptune backstage media'
          git pull --rebase origin main
          git push origin HEAD:main
