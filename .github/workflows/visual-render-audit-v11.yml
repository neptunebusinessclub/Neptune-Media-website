name: Visual Render Audit v11

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/visual-render-audit-v11.yml'
      - 'neptune-tv-media-cloudflare/public/styles/visual-polish-v11.css'
      - 'neptune-tv-media-cloudflare/public/visual-polish-v11.js'
      - 'neptune-tv-media-cloudflare/src/public-router.js'
      - 'visual-audit-v11-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-visual-render-audit-v11
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright Chromium
        run: |
          mkdir -p /tmp/neptune-v11-audit
          cd /tmp/neptune-v11-audit
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium

      - name: Wait for visual polish production marker
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 24); do
            nonce="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl --fail --silent --show-error -H 'Cache-Control: no-cache' "$BASE_URL/?visual_v11=$nonce" > /tmp/home.html \
              && grep -q '/styles/visual-polish-v11.css?v=1' /tmp/home.html \
              && grep -q '/visual-polish-v11.js?v=1' /tmp/home.html; then
              ready=true
              break
            fi
            sleep 10
          done
          test "$ready" = "true"

      - name: Capture and diagnose every public rendering
        run: |
          set -euo pipefail
          rm -rf visual-audit/v11
          mkdir -p visual-audit/v11
          cat > /tmp/neptune-v11-audit/audit.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs/promises';
          import path from 'node:path';

          const base = process.env.BASE_URL;
          const output = path.resolve(process.cwd(), 'visual-audit/v11');
          const viewports = [
            { name: 'desktop-1440', width: 1440, height: 1000 },
            { name: 'laptop-1280', width: 1280, height: 800 },
            { name: 'tablet-834', width: 834, height: 1112 },
            { name: 'mobile-390', width: 390, height: 844 },
            { name: 'mobile-360', width: 360, height: 800 },
          ];
          const routes = [
            { name: 'home', url: '/' },
            { name: 'emissions', url: '/emissions/' },
            { name: 'direct', url: '/direct/' },
          ];
          const report = { generatedAt: new Date().toISOString(), base, captures: [], issues: [] };
          const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });

          const slug = (value) => value.replace(/[^a-z0-9-]+/gi, '-').toLowerCase();
          for (const viewport of viewports) {
            const context = await browser.newContext({ viewport: { width: viewport.width, height: viewport.height }, reducedMotion: 'reduce' });
            for (const route of routes) {
              const page = await context.newPage();
              const httpErrors = [];
              const consoleErrors = [];
              page.on('response', (response) => {
                const status = response.status();
                if (status >= 400) httpErrors.push({ status, url: response.url(), resourceType: response.request().resourceType() });
              });
              page.on('console', (message) => {
                if (message.type() === 'error' && !message.text().startsWith('Failed to load resource:')) consoleErrors.push(message.text());
              });

              let status = 0;
              const url = `${base}${route.url}?audit_v11=${Date.now()}`;
              try {
                const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60000 });
                status = response?.status() || 0;
                await page.waitForLoadState('networkidle', { timeout: 15000 }).catch(() => {});
                await page.waitForTimeout(2800);
              } catch (error) {
                report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'navigation', message: String(error) });
              }

              const diagnostics = await page.evaluate(() => {
                const visible = (element) => {
                  const style = getComputedStyle(element);
                  const rect = element.getBoundingClientRect();
                  return style.display !== 'none' && style.visibility !== 'hidden' && Number(style.opacity) !== 0 && rect.width > 0 && rect.height > 0;
                };
                const identify = (element) => element.id ? `#${element.id}` : `${element.tagName.toLowerCase()}${[...element.classList].slice(0, 3).map((item) => `.${item}`).join('')}`;
                const root = document.documentElement;
                const overflow = Math.max(root.scrollWidth, document.body.scrollWidth) - innerWidth;
                const brokenImages = [...document.images]
                  .filter((image) => visible(image) && image.complete && image.naturalWidth === 0)
                  .map((image) => ({ selector: identify(image), src: image.currentSrc || image.src }));
                const clippedText = [...document.querySelectorAll('h1,h2,h3,p,blockquote,button,a,span')]
                  .filter((element) => visible(element) && !element.classList.contains('sr-only') && element.getAttribute('aria-hidden') !== 'true' && (element.textContent || '').trim().length > 8)
                  .filter((element) => {
                    const style = getComputedStyle(element);
                    const intentionalScroll = ['auto', 'scroll'].includes(style.overflowX) || ['auto', 'scroll'].includes(style.overflowY);
                    const clamped = style.webkitLineClamp && style.webkitLineClamp !== 'none';
                    if (intentionalScroll || clamped || element.closest('.media-card-copy,.seo-card-copy')) return false;
                    return element.scrollWidth > element.clientWidth + 8 || element.scrollHeight > element.clientHeight + 8;
                  })
                  .slice(0, 30)
                  .map((element) => ({ selector: identify(element), text: element.textContent.trim().slice(0, 140), client: [element.clientWidth, element.clientHeight], scroll: [element.scrollWidth, element.scrollHeight] }));
                const offscreen = [...document.querySelectorAll('main *')]
                  .filter(visible)
                  .filter((element) => {
                    const rect = element.getBoundingClientRect();
                    const allowed = element.closest('[data-rail-track],.seo-grid-shorts,.media-filter-row');
                    return !allowed && (rect.left < -3 || rect.right > innerWidth + 3) && getComputedStyle(element).position !== 'fixed';
                  })
                  .slice(0, 30)
                  .map((element) => { const rect = element.getBoundingClientRect(); return { selector: identify(element), rect: [Math.round(rect.left), Math.round(rect.top), Math.round(rect.right), Math.round(rect.bottom)] }; });
                const smallTargets = innerWidth <= 834 ? [...document.querySelectorAll('a,button,input,summary')]
                  .filter(visible)
                  .map((element) => ({ element, rect: element.getBoundingClientRect() }))
                  .filter(({ rect }) => rect.width < 42 || rect.height < 42)
                  .slice(0, 30)
                  .map(({ element, rect }) => ({ selector: identify(element), text: (element.textContent || element.getAttribute('aria-label') || '').trim().slice(0, 90), size: [Math.round(rect.width), Math.round(rect.height)] })) : [];
                return {
                  visualPolish: document.documentElement.dataset.visualPolish || '',
                  horizontalOverflow: overflow,
                  brokenImages,
                  clippedText,
                  offscreen,
                  smallTargets,
                  duplicateProgramPills: document.querySelectorAll('.catalogue-page > .program-pills').length,
                  legacyHomepageBlocks: document.body.matches('[data-home-structure="conversion-voice-v10"]') ? document.querySelectorAll('.media-discovery,.catalog-tools,#livrables').length : 0,
                  heroAspect: document.querySelector('.hero-media') ? getComputedStyle(document.querySelector('.hero-media')).aspectRatio : '',
                };
              });

              const prefix = `${route.name}-${viewport.name}`;
              await page.screenshot({ path: path.join(output, `${prefix}-fold.jpg`), type: 'jpeg', quality: 62, fullPage: false });
              await page.screenshot({ path: path.join(output, `${prefix}-full.jpg`), type: 'jpeg', quality: 46, fullPage: true });

              if (route.name === 'home') {
                for (const [kind, selector] of [['episode', '#dynamicCatalog [data-episode-id], #dynamicCatalog [data-video-src]'], ['short', '#shortsCatalog [data-episode-id], #shortsCatalog [data-video-src]']]) {
                  const card = page.locator(selector).first();
                  if (await card.count()) {
                    await card.scrollIntoViewIfNeeded().catch(() => {});
                    await card.click().catch(() => {});
                    await page.waitForTimeout(900);
                    if (await page.locator('[data-video-modal].is-open').count()) {
                      await page.screenshot({ path: path.join(output, `${prefix}-${kind}-modal.jpg`), type: 'jpeg', quality: 62, fullPage: false });
                      await page.locator('[data-video-close]').click().catch(() => {});
                    }
                  }
                }
              }

              const capture = { viewport, route, status, diagnostics, httpErrors, consoleErrors };
              report.captures.push(capture);
              if (status >= 400 || status === 0) report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'http-page', message: `HTTP ${status}` });
              if (diagnostics.visualPolish !== 'v11') report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'missing-polish', message: diagnostics.visualPolish || 'absent' });
              if (diagnostics.horizontalOverflow > 3) report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'horizontal-overflow', message: `${diagnostics.horizontalOverflow}px` });
              if (diagnostics.duplicateProgramPills) report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'duplicate-filters', message: String(diagnostics.duplicateProgramPills) });
              if (diagnostics.legacyHomepageBlocks) report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'legacy-home-blocks', message: String(diagnostics.legacyHomepageBlocks) });
              for (const issue of diagnostics.brokenImages) report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'broken-image', ...issue });
              for (const issue of diagnostics.clippedText) report.issues.push({ severity: 'warning', viewport: viewport.name, route: route.name, type: 'clipped-text', ...issue });
              for (const issue of diagnostics.offscreen) report.issues.push({ severity: 'warning', viewport: viewport.name, route: route.name, type: 'offscreen-element', ...issue });
              for (const issue of diagnostics.smallTargets) report.issues.push({ severity: 'warning', viewport: viewport.name, route: route.name, type: 'small-target', ...issue });
              for (const issue of httpErrors) report.issues.push({ severity: 'error', viewport: viewport.name, route: route.name, type: 'http-resource', message: `${issue.status} ${issue.resourceType} ${issue.url}` });
              for (const issue of consoleErrors) report.issues.push({ severity: 'warning', viewport: viewport.name, route: route.name, type: 'console-error', message: issue });
              await page.close();
            }
            await context.close();
          }
          await browser.close();

          const counts = report.issues.reduce((result, issue) => { result[issue.severity] = (result[issue.severity] || 0) + 1; return result; }, {});
          await fs.writeFile(path.join(output, 'audit.json'), JSON.stringify(report, null, 2));
          const rows = report.issues.slice(0, 150).map((issue) => `| ${issue.severity} | ${issue.viewport} | ${issue.route} | ${issue.type} | ${(issue.message || issue.text || issue.selector || '').replaceAll('|', '\\|')} |`).join('\n');
          await fs.writeFile(path.join(output, 'README.md'), `# Audit visuel Neptune Media v11\n\nGénéré : ${report.generatedAt}\n\n- Captures : ${report.captures.length}\n- Erreurs : ${counts.error || 0}\n- Avertissements : ${counts.warning || 0}\n\n| Niveau | Écran | Page | Type | Détail |\n|---|---|---|---|---|\n${rows || '| — | — | — | — | Aucun problème détecté |'}\n`);
          if ((counts.error || 0) > 0) process.exitCode = 2;
          JS
          node /tmp/neptune-v11-audit/audit.mjs || audit_code=$?
          printf '{"run_id":%s,"artifact_name":"neptune-visual-audit-v11-%s","source_sha":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_RUN_ID" "$GITHUB_SHA" > visual-audit/v11/artifact-run.json
          exit "${audit_code:-0}"

      - name: Upload screenshot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neptune-visual-audit-v11-${{ github.run_id }}
          path: visual-audit/v11
          if-no-files-found: error
          retention-days: 14

      - name: Commit screenshot evidence
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add visual-audit/v11
          git commit -m 'chore: capture Neptune v11 visual audit [skip ci]' || true
          git pull --rebase origin main || true
          git push
