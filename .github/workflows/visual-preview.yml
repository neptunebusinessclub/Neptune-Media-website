name: Visual Audit Previews

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/visual-preview.yml'
      - 'visual-audit/latest/*.jpg'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  previews:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate compact previews
        run: |
          python3 -m pip install --quiet pillow
          python3 - <<'PY'
          from pathlib import Path
          from PIL import Image, ImageOps, ImageDraw

          root = Path('visual-audit/latest')
          previews = root / 'previews'
          previews.mkdir(parents=True, exist_ok=True)

          sources = sorted(p for p in root.glob('*.jpg') if not p.name.startswith('preview-'))
          for source in sources:
              with Image.open(source) as image:
                  image = image.convert('RGB')
                  is_full = source.name.endswith('-full.jpg')
                  max_width = 240 if is_full else 420
                  max_height = 2600 if is_full else 900
                  image.thumbnail((max_width, max_height), Image.Resampling.LANCZOS)
                  image.save(previews / source.name, 'JPEG', quality=32, optimize=True, progressive=True)

          home_folds = [previews / f'home-{name}-fold.jpg' for name in ('desktop-1440','laptop-1280','tablet-834','mobile-390','mobile-360')]
          home_folds = [p for p in home_folds if p.exists()]
          if home_folds:
              thumbs = []
              for p in home_folds:
                  img = Image.open(p).convert('RGB')
                  canvas = Image.new('RGB', (440, img.height + 46), '#070d1c')
                  canvas.paste(img, ((440 - img.width)//2, 34))
                  draw = ImageDraw.Draw(canvas)
                  draw.text((12, 10), p.stem.replace('home-', '').replace('-fold',''), fill='white')
                  thumbs.append(canvas)
              width = max(i.width for i in thumbs)
              height = sum(i.height for i in thumbs) + 12 * (len(thumbs)-1)
              sheet = Image.new('RGB', (width, height), '#020611')
              y = 0
              for img in thumbs:
                  sheet.paste(img, (0, y))
                  y += img.height + 12
              sheet.save(previews / 'home-fold-contact-sheet.jpg', 'JPEG', quality=34, optimize=True, progressive=True)
          PY

      - name: Commit previews
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add visual-audit/latest/previews
          git commit -m 'chore: add compact visual audit previews [skip ci]' || true
          git pull --rebase origin main || true
          git push
