name: Visual Regression Audit v13

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/visual-regression-v13.yml'
      - 'visual-audit-v13-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-visual-regression-v13
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright Chromium
        run: |
          mkdir -p /tmp/neptune-v13
          cd /tmp/neptune-v13
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium

      - name: Wait for visual assets v2
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 24); do
            nonce="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl --fail --silent --show-error -H 'Cache-Control: no-cache' "$BASE_URL/?visual_v13=$nonce" > /tmp/home.html \
              && grep -q '/styles/visual-polish-v11.css?v=2' /tmp/home.html \
              && grep -q '/visual-polish-v11.js?v=2' /tmp/home.html; then
              ready=true
              break
            fi
            sleep 10
          done
          test "$ready" = "true"

      - name: Capture targeted desktop tablet and mobile renderings
        continue-on-error: true
        run: |
          rm -rf visual-audit/v13
          mkdir -p visual-audit/v13
          printf '{"run_id":%s,"artifact_name":"neptune-visual-regression-v13-%s","source_sha":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_RUN_ID" "$GITHUB_SHA" > visual-audit/v13/artifact-run.json
          cat > /tmp/neptune-v13/audit.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs/promises';
          import path from 'node:path';

          const base = process.env.BASE_URL;
          const output = path.resolve(process.cwd(), 'visual-audit/v13');
          const viewports = [
            { name: 'desktop-1440', width: 1440, height: 1000 },
            { name: 'tablet-834', width: 834, height: 1112 },
            { name: 'mobile-390', width: 390, height: 844 },
          ];
          const report = { generatedAt: new Date().toISOString(), base, captures: [], issues: [] };
          const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });

          async function capture(page, viewport, pageName, selector, label) {
            const target = selector === 'page' ? page : page.locator(selector).first();
            if (selector !== 'page' && (!await target.count() || !await target.isVisible().catch(() => false))) {
              report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'missing-section', message: `${label}: ${selector}` });
              return;
            }
            if (selector !== 'page') await target.scrollIntoViewIfNeeded().catch(() => {});
            await page.waitForTimeout(120);
            try {
              await target.screenshot({ path: path.join(output, `${pageName}-${viewport.name}-${label}.jpg`), type: 'jpeg', quality: 62, animations: 'disabled', fullPage: false });
            } catch (error) {
              report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'screenshot', message: `${label}: ${String(error)}` });
            }
          }

          async function inspect(page, viewport, pageName) {
            const result = await page.evaluate(() => {
              const visible = (element) => {
                const style = getComputedStyle(element);
                const rect = element.getBoundingClientRect();
                return style.display !== 'none' && style.visibility !== 'hidden' && Number(style.opacity) !== 0 && rect.width > 0 && rect.height > 0;
              };
              const identify = (element) => element.id
                ? `#${element.id}`
                : `${element.tagName.toLowerCase()}${[...element.classList].slice(0, 3).map((item) => `.${item}`).join('')}`;
              const root = document.documentElement;
              const overflow = Math.max(root.scrollWidth, document.body.scrollWidth) - innerWidth;
              const brokenImages = [...document.images]
                .filter((image) => visible(image) && image.complete && image.naturalWidth === 0)
                .map((image) => ({ selector: identify(image), src: image.currentSrc || image.src }));
              const clippedText = [...document.querySelectorAll('h1,h2,h3,p,blockquote,button,a,span')]
                .filter((element) => visible(element) && !element.classList.contains('sr-only') && element.getAttribute('aria-hidden') !== 'true' && (element.textContent || '').trim().length > 8)
                .filter((element) => {
                  const style = getComputedStyle(element);
                  if (['auto', 'scroll'].includes(style.overflowX) || ['auto', 'scroll'].includes(style.overflowY)) return false;
                  if (style.webkitLineClamp && style.webkitLineClamp !== 'none') return false;
                  if (element.closest('.media-card-copy,.seo-card-copy')) return false;
                  return element.scrollWidth > element.clientWidth + 8 || element.scrollHeight > element.clientHeight + 8;
                })
                .slice(0, 30)
                .map((element) => ({ selector: identify(element), text: element.textContent.trim().slice(0, 140), client: [element.clientWidth, element.clientHeight], scroll: [element.scrollWidth, element.scrollHeight] }));
              const skip = document.querySelector('.skip-link');
              const skipRect = skip?.getBoundingClientRect();
              const proofCards = [...document.querySelectorAll('.proof-compact article')].map((card) => ({ clientHeight: card.clientHeight, scrollHeight: card.scrollHeight }));
              const finalCard = document.querySelector('.voice-final .cta-card');
              const pseudo = finalCard ? getComputedStyle(finalCard, '::after').content : 'none';
              const faqHeading = document.querySelector('#questions .faq-intro h2');
              return {
                polish: document.documentElement.dataset.visualPolish || '',
                overflow,
                brokenImages,
                clippedText,
                legacyBlocks: document.body.matches('[data-home-structure="conversion-voice-v10"]') ? document.querySelectorAll('.media-discovery,.catalog-tools,#livrables').length : 0,
                duplicatePills: location.pathname.startsWith('/emissions') ? document.querySelectorAll('.catalogue-page > .program-pills').length : 0,
                finalThought: document.querySelector('.voice-final .inner-voice-hook')?.textContent.trim() || '',
                finalPseudo: pseudo,
                skipBottom: skipRect ? Math.round(skipRect.bottom) : null,
                proofCards,
                faqFontSize: faqHeading ? parseFloat(getComputedStyle(faqHeading).fontSize) : 0,
              };
            });
            report.captures.push({ viewport, page: pageName, diagnostics: result });
            if (result.polish !== 'v11') report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'missing-polish', message: result.polish || 'absent' });
            if (result.overflow > 3) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'horizontal-overflow', message: `${result.overflow}px` });
            if (result.legacyBlocks) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'legacy-blocks', message: String(result.legacyBlocks) });
            if (result.duplicatePills) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'duplicate-filters', message: String(result.duplicatePills) });
            if (pageName === 'home' && result.finalThought !== '« Je veux être plus visible. Mais je veux pas devenir quelqu’un d’autre pour y arriver. »') report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'final-copy', message: result.finalThought });
            if (pageName === 'home' && !['none', 'normal', '""'].includes(result.finalPseudo)) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'final-pseudo', message: result.finalPseudo });
            if (pageName === 'home' && result.skipBottom !== null && result.skipBottom > 0) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'skip-link-visible', message: `${result.skipBottom}px` });
            if (pageName === 'home' && result.proofCards.some((card) => card.scrollHeight > card.clientHeight + 4)) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'proof-card-clipping', message: JSON.stringify(result.proofCards) });
            if (pageName === 'home' && result.faqFontSize > 54) report.issues.push({ severity: 'warning', viewport: viewport.name, page: pageName, type: 'faq-heading-size', message: `${result.faqFontSize}px` });
            for (const issue of result.brokenImages) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'broken-image', ...issue });
            for (const issue of result.clippedText) report.issues.push({ severity: 'warning', viewport: viewport.name, page: pageName, type: 'clipped-text', ...issue });
          }

          for (const viewport of viewports) {
            const context = await browser.newContext({ viewport: { width: viewport.width, height: viewport.height }, reducedMotion: 'reduce' });
            for (const pageName of ['home', 'emissions', 'direct']) {
              const route = pageName === 'home' ? '/' : `/${pageName}/`;
              const page = await context.newPage();
              const response = await page.goto(`${base}${route}?audit_v13=${Date.now()}`, { waitUntil: 'domcontentloaded', timeout: 60000 }).catch(() => null);
              if (!response || response.status() >= 400) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'http-page', message: response ? String(response.status()) : 'navigation failed' });
              await page.waitForLoadState('networkidle', { timeout: 15000 }).catch(() => {});
              await page.waitForTimeout(2600);
              await inspect(page, viewport, pageName);

              if (pageName === 'home') {
                await capture(page, viewport, pageName, 'page', 'fold');
                await capture(page, viewport, pageName, '.voice-hero', 'hero');
                await capture(page, viewport, pageName, '#solution', 'solution');
                await capture(page, viewport, pageName, '#questions', 'faq');
                await capture(page, viewport, pageName, '.voice-final', 'final');
                for (const [kind, selector] of [['episode', '#dynamicCatalog [data-episode-id], #dynamicCatalog [data-video-src]'], ['short', '#shortsCatalog [data-episode-id], #shortsCatalog [data-video-src]']]) {
                  const card = page.locator(selector).first();
                  if (await card.count()) {
                    await card.scrollIntoViewIfNeeded().catch(() => {});
                    await card.click().catch(() => {});
                    await page.waitForTimeout(850);
                    if (await page.locator('[data-video-modal].is-open').count()) {
                      await capture(page, viewport, pageName, 'page', `${kind}-modal`);
                      await page.locator('[data-video-close]').click().catch(() => {});
                    }
                  }
                }
              } else if (pageName === 'emissions') {
                await capture(page, viewport, pageName, 'page', 'fold');
                await capture(page, viewport, pageName, '.seo-search-panel', 'search');
                await capture(page, viewport, pageName, '[data-media-section="episode"]', 'episodes');
                await capture(page, viewport, pageName, '[data-media-section="short"]', 'shorts');
              } else {
                await capture(page, viewport, pageName, 'page', 'fold');
                await capture(page, viewport, pageName, '.live-channel,.live-empty-panel', 'channel');
              }
              await page.close();
            }
            await context.close();
          }

          await browser.close();
          const counts = report.issues.reduce((acc, issue) => { acc[issue.severity] = (acc[issue.severity] || 0) + 1; return acc; }, {});
          await fs.writeFile(path.join(output, 'audit.json'), JSON.stringify(report, null, 2));
          const rows = report.issues.map((issue) => `| ${issue.severity} | ${issue.viewport} | ${issue.page} | ${issue.type} | ${(issue.message || issue.text || issue.selector || '').replaceAll('|', '\\|')} |`).join('\n');
          await fs.writeFile(path.join(output, 'README.md'), `# Audit de régression visuelle Neptune v13\n\nGénéré : ${report.generatedAt}\n\n- Rendus : ${report.captures.length}\n- Erreurs : ${counts.error || 0}\n- Avertissements : ${counts.warning || 0}\n\n| Niveau | Écran | Page | Type | Détail |\n|---|---|---|---|---|\n${rows || '| — | — | — | — | Aucun problème détecté |'}\n`);
          JS
          node /tmp/neptune-v13/audit.mjs

      - name: Upload visual regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neptune-visual-regression-v13-${{ github.run_id }}
          path: visual-audit/v13
          if-no-files-found: error
          retention-days: 14

      - name: Commit visual regression report
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add visual-audit/v13
          git commit -m 'chore: capture Neptune v13 visual regression [skip ci]' || true
          git pull --rebase origin main || true
          git push
