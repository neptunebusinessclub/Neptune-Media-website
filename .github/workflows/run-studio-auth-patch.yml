name: Run studio authentication patch

on:
  push:
    paths:
      - auth-apply-trigger.txt
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract and run authentication patch
        shell: bash
        run: |
          awk "/python3 <<'PY'/{flag=1;next} /^          PY$/{flag=0} flag{sub(/^          /,\"\"); print}" .github/workflows/implement-studio-password-reset.yml > /tmp/apply_auth.py
          python3 /tmp/apply_auth.py

      - name: Validate JavaScript
        run: |
          cd neptune-tv-media-cloudflare
          npm install
          npm run check

      - name: Commit applied authentication
        shell: bash
        run: |
          rm -f auth-apply-trigger.txt
          rm -f .github/workflows/implement-studio-password-reset.yml
          rm -f .github/workflows/run-studio-auth-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add secure first-login and password reset flow"
          git push
