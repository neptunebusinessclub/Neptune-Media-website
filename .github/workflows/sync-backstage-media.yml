name: Sync Neptune backstage media

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-backstage-media.yml

permissions:
  contents: write

concurrency:
  group: sync-neptune-backstage-media
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install media tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python -m pip install --quiet gdown

      - name: Download and optimize studio media
        shell: bash
        run: |
          set -euo pipefail
          target="neptune-tv-media-cloudflare/public/assets/backstage"
          work="${RUNNER_TEMP}/neptune-backstage"
          mkdir -p "$target" "$work"

          gdown "https://drive.google.com/uc?id=1zNuZx-QK9qeZvxfwHkHoQ4s-cZs68Ls-" -O "$work/backstage-01.mov"
          gdown "https://drive.google.com/uc?id=16EQ9ZB_bX6l5RxdWr4KURGhKgLKjYoCs" -O "$work/backstage-02.mov"
          gdown "https://drive.google.com/uc?id=1WlyVRXsKSxMsDov2mapvWhEoak5e8y57" -O "$work/backstage-03.mov"
          gdown "https://drive.google.com/uc?id=1QT_UW8AWvBtv48lRdlgNKER0dmis8upO" -O "$work/studio-backstage.png"

          for index in 01 02 03; do
            ffmpeg -y -loglevel error \
              -i "$work/backstage-${index}.mov" \
              -an \
              -vf "scale=480:854:force_original_aspect_ratio=decrease,pad=480:854:(ow-iw)/2:(oh-ih)/2,fps=24" \
              -c:v libx264 -preset slow -crf 29 -profile:v main -level 3.1 \
              -pix_fmt yuv420p -movflags +faststart \
              "$target/backstage-${index}.mp4"

            ffmpeg -y -loglevel error \
              -ss 1.2 -i "$work/backstage-${index}.mov" -frames:v 1 \
              -vf "scale=720:-2" -c:v libwebp -quality 74 \
              "$target/poster-${index}.webp"
          done

          ffmpeg -y -loglevel error \
            -i "$work/studio-backstage.png" \
            -vf "scale='min(1600,iw)':-2" -c:v libwebp -quality 82 \
            "$target/studio-backstage.webp"

          test -s "$target/backstage-01.mp4"
          test -s "$target/backstage-02.mp4"
          test -s "$target/backstage-03.mp4"
          test -s "$target/poster-01.webp"
          test -s "$target/poster-02.webp"
          test -s "$target/poster-03.webp"
          test -s "$target/studio-backstage.webp"

      - name: Commit optimized media
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add neptune-tv-media-cloudflare/public/assets/backstage
          if git diff --cached --quiet; then
            echo "Backstage media already synchronized."
            exit 0
          fi
          git commit -m "Add optimized Neptune backstage studio media"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep 5
          done
          exit 1
