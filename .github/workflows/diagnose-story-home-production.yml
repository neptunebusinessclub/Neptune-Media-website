name: Diagnose streaming homepage production

on:
  push:
    branches: [main]
    paths-ignore:
      - story-home-production-diagnostic.json
      - deployment-status.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-media-home-diagnostic
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for production and collect evidence
        run: |
          set -u
          for attempt in $(seq 1 24); do
            home_status=$(curl --silent --show-error --output /tmp/home.html --write-out '%{http_code}' "$PUBLIC_URL/" || true)
            css_status=$(curl --silent --show-error --output /tmp/neptune-streaming.css --write-out '%{http_code}' "$PUBLIC_URL/styles/neptune-streaming.css?v=9" || true)
            health_status=$(curl --silent --show-error --output /tmp/health.json --write-out '%{http_code}' "$PUBLIC_URL/api/health" || true)
            if test "$home_status" = "200" \
              && test "$css_status" = "200" \
              && test "$health_status" = "200" \
              && grep -q 'data-home-structure="streaming-aida-v3"' /tmp/home.html \
              && grep -q 'Votre expertise mérite d’être vue' /tmp/home.html \
              && grep -q 'data-content-rail' /tmp/home.html \
              && grep -q 'live-now-card' /tmp/home.html \
              && grep -q 'Compact shorts and avatar-first headings v9' /tmp/neptune-streaming.css \
              && grep -q '"ok":true' /tmp/health.json; then
              break
            fi
            sleep 10
          done

      - name: Build production report
        run: |
          home_status=$(curl --silent --show-error --output /tmp/home.html --write-out '%{http_code}' "$PUBLIC_URL/" || true)
          css_status=$(curl --silent --show-error --output /tmp/neptune-streaming.css --write-out '%{http_code}' "$PUBLIC_URL/styles/neptune-streaming.css?v=9" || true)
          health_status=$(curl --silent --show-error --output /tmp/health.json --write-out '%{http_code}' "$PUBLIC_URL/api/health" || true)
          HOME_STATUS="$home_status" CSS_STATUS="$css_status" HEALTH_STATUS="$health_status" python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          def contains(path, needle):
              try:
                  return needle in Path(path).read_text(encoding='utf-8', errors='replace')
              except FileNotFoundError:
                  return False

          checks = {
              'structure_marker': contains('/tmp/home.html', 'data-home-structure="streaming-aida-v3"'),
              'conversion_hook': contains('/tmp/home.html', 'Votre expertise mérite d’être vue'),
              'story_hook': contains('/tmp/home.html', 'Vous recommencez la prise pour la sixième fois'),
              'content_rail': contains('/tmp/home.html', 'data-content-rail'),
              'live_card': contains('/tmp/home.html', 'live-now-card'),
              'search': contains('/tmp/home.html', 'Invité, entreprise ou sujet'),
              'formats_section': contains('/tmp/home.html', 'id="formats"'),
              'commitments_section': contains('/tmp/home.html', 'id="engagements"'),
              'faq': contains('/tmp/home.html', 'id="faq-answer-1"'),
              'official_tunnel': contains('/tmp/home.html', 'https://media.neptunebusiness.com/'),
          }
          css_ok = contains('/tmp/neptune-streaming.css', 'Compact shorts and avatar-first headings v9')
          health_ok = contains('/tmp/health.json', '"ok":true')
          statuses_ok = all(os.environ[key] == '200' for key in ('HOME_STATUS', 'CSS_STATUS', 'HEALTH_STATUS'))
          report = {
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'ready': statuses_ok and all(checks.values()) and css_ok and health_ok,
              'home': {'status': os.environ['HOME_STATUS'], **checks},
              'css': {'status': os.environ['CSS_STATUS'], 'streaming_styles': css_ok},
              'health': {'status': os.environ['HEALTH_STATUS'], 'ok': health_ok},
          }
          Path('story-home-production-diagnostic.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit production diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add story-home-production-diagnostic.json
          git commit -m "chore: record streaming homepage production diagnostic [skip ci]" || true
          git pull --rebase origin main || true
          git push
