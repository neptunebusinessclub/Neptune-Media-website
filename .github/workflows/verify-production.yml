name: Verify Studio production route

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Wait for Cloudflare and verify control room route
        shell: bash
        run: |
          set -euo pipefail
          URL="https://neptune-media-webtv.neptunebusinessclub.workers.dev/api/admin/control-room"
          for attempt in $(seq 1 20); do
            status="$(curl --silent --show-error --output /tmp/control-room.json --write-out '%{http_code}' "$URL" || true)"
            echo "Attempt $attempt: HTTP $status"
            if [[ "$status" == "401" || "$status" == "403" ]]; then
              echo "Studio control room route is active."
              exit 0
            fi
            if [[ "$status" != "404" && "$status" != "000" && "$status" -lt 500 ]]; then
              echo "Unexpected response body:"
              cat /tmp/control-room.json || true
            fi
            sleep 15
          done
          echo "The deployed Worker still does not expose the Studio control room route."
          cat /tmp/control-room.json || true
          exit 1
