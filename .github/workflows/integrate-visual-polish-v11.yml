name: Integrate Visual Polish v11

on:
  push:
    branches: [main]
    paths:
      - 'scripts/integrate-visual-polish-v11.py'
      - '.github/workflows/integrate-visual-polish-v11.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: integrate-visual-polish-v11
  cancel-in-progress: true

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch deployment and screenshot audit
        run: python3 scripts/integrate-visual-polish-v11.py

      - name: Commit workflow integration
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/deploy-cloudflare.yml .github/workflows/visual-render-audit.yml
          git commit -m 'ci: integrate screenshot-verified visual polish v11' || true
          git pull --rebase origin main || true
          git push
