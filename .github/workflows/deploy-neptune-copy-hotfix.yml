name: Deploy Neptune Copy Hotfix

on:
  push:
    branches: [main]
    paths:
      - 'neptune-tv-media-cloudflare/src/public-router.js'
      - 'neptune-tv-media-cloudflare/src/public-render.js'
      - 'neptune-tv-media-cloudflare/src/public-seo.js'
      - 'neptune-tv-media-cloudflare/public/index.html'
      - 'neptune-tv-media-cloudflare/public/home-live.js'
      - 'neptune-tv-media-cloudflare/public/landing-conversion.js'
      - 'neptune-tv-media-cloudflare/public/styles/neptune-streaming.css'
      - 'neptune-tv-media-cloudflare/public/styles/visual-polish-v11.css'
      - 'neptune-tv-media-cloudflare/public/visual-polish-v11.js'
      - 'neptune-tv-media-cloudflare/public/styles/final-experience-v12.css'
      - 'neptune-tv-media-cloudflare/public/final-experience-v12.js'
      - 'neptune-tv-media-cloudflare/public/app.js'
      - 'neptune-tv-media-cloudflare/src/public-layout.js'
      - 'neptune-tv-media-cloudflare/package.json'
      - 'neptune-tv-media-cloudflare/scripts/qa-production-ui.mjs'
      - 'scripts/apply-home-architecture-v10.py'
      - 'scripts/apply-visual-polish-v11.py'
      - 'scripts/apply-final-experience-v12.py'
      - 'scripts/cleanup-render-polish-duplicates.py'
      - '.github/workflows/deploy-neptune-copy-hotfix.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-copy-hotfix-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize and finalize generated source
        id: normalize
        working-directory: .
        run: |
          set -euo pipefail
          python3 scripts/cleanup-render-polish-duplicates.py
          python3 scripts/apply-home-architecture-v10.py
          python3 scripts/apply-visual-polish-v11.py
          grep -q 'data-final-ux="v12"' neptune-tv-media-cloudflare/public/index.html
          grep -q 'production-pipeline' neptune-tv-media-cloudflare/public/index.html
          grep -q 'data-format-recommendation' neptune-tv-media-cloudflare/public/index.html
          grep -q '/styles/final-experience-v12.css?v=1' neptune-tv-media-cloudflare/public/index.html
          grep -q '/final-experience-v12.js?v=1' neptune-tv-media-cloudflare/public/index.html
          ! grep -q 'apple-conversion-v13.css' neptune-tv-media-cloudflare/public/index.html

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        id: install
        run: npm install --package-lock=false --registry=https://registry.npmjs.org

      - name: Validate source
        id: validate
        run: npm run check

      - name: Validate Cloudflare bundle
        run: npx wrangler deploy --dry-run

      - name: Deploy current source
        id: deploy
        run: npx wrangler deploy

      - name: Verify final v12 production and critical routes
        id: verify
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 18); do
            nonce="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/?final_v12=$nonce" > /tmp/home.html \
              && grep -q 'data-home-structure="conversion-voice-v10"' /tmp/home.html \
              && grep -q 'data-final-ux="v12"' /tmp/home.html \
              && grep -q '/styles/final-experience-v12.css?v=1' /tmp/home.html \
              && grep -q '/final-experience-v12.js?v=1' /tmp/home.html \
              && grep -q 'production-pipeline' /tmp/home.html \
              && grep -q 'data-format-recommendation' /tmp/home.html \
              && ! grep -q 'apple-conversion-v13.css' /tmp/home.html; then
              ready=true
              break
            fi
            sleep 10
          done
          test "$ready" = "true"

          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/styles/final-experience-v12.css?v=1&final_v12=$nonce" > /tmp/final.css
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/final-experience-v12.js?v=1&final_v12=$nonce" > /tmp/final.js
          grep -q 'Neptune Media final experience v12' /tmp/final.css
          grep -q 'bindFormatDecision' /tmp/final.js
          grep -q 'bindRailAffordance' /tmp/final.js
          node --check /tmp/final.js

          for route in direct emissions; do
            curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/$route/?final_v12=$nonce" > "/tmp/$route.html"
            grep -q '/styles/final-experience-v12.css?v=1' "/tmp/$route.html"
            grep -q '/final-experience-v12.js?v=1' "/tmp/$route.html"
          done

          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/studio/?final_v12=$nonce" -D /tmp/studio.headers > /tmp/studio.html
          grep -qi '^x-robots-tag:.*noindex' /tmp/studio.headers

          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/api/health?final_v12=$nonce" > /tmp/health.json
          node -e "const d=require('/tmp/health.json'); if(d.ok!==true) process.exit(1)"

          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/api/public/catalog?final_v12=$nonce" -D /tmp/catalog.headers > /tmp/catalog.json
          node -e "const d=require('/tmp/catalog.json'); if(!Array.isArray(d.programs)||!Array.isArray(d.episodes)||!Array.isArray(d.ads)) process.exit(1)"
          grep -qi '^cache-control:.*no-store' /tmp/catalog.headers

          for route in robots.txt sitemap.xml video-sitemap.xml llms.txt; do
            curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/$route?final_v12=$nonce" > "/tmp/${route//\//_}"
          done
          grep -q 'Sitemap:' /tmp/robots.txt
          grep -q '<urlset' /tmp/sitemap.xml
          grep -q '<video:video>' /tmp/video-sitemap.xml
          grep -qi 'Neptune Media' /tmp/llms.txt

          admin_list_status=$(curl --silent --show-error --output /tmp/admin-list.json --write-out '%{http_code}' -H 'Cache-Control: no-cache' "$PUBLIC_URL/api/admin/clients?final_v12=$nonce")
          test "$admin_list_status" = "401"
          node -e "const d=require('/tmp/admin-list.json'); if(d.error!=='unauthorized') process.exit(1)"

          admin_mutation_status=$(curl --silent --show-error --output /tmp/admin-mutation.json --write-out '%{http_code}' -X POST -H 'Content-Type: application/json' -H 'Origin: https://example.invalid' --data '{}' "$PUBLIC_URL/api/admin/client-update?final_v12=$nonce")
          test "$admin_mutation_status" = "403"
          node -e "const d=require('/tmp/admin-mutation.json'); if(d.error!=='origin_forbidden') process.exit(1)"

      - name: Record hotfix deployment result
        if: always()
        env:
          NORMALIZE_OUTCOME: ${{ steps.normalize.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          outcomes = {
              'normalize': os.environ.get('NORMALIZE_OUTCOME', 'unknown'),
              'install': os.environ.get('INSTALL_OUTCOME', 'unknown'),
              'validate': os.environ.get('VALIDATE_OUTCOME', 'unknown'),
              'deploy': os.environ.get('DEPLOY_OUTCOME', 'unknown'),
              'verify': os.environ.get('VERIFY_OUTCOME', 'unknown'),
          }
          report = {
              'status': 'success' if all(value == 'success' for value in outcomes.values()) else 'failed',
              'source_sha': os.environ.get('GITHUB_SHA', ''),
              'workflow_run_id': os.environ.get('WORKFLOW_RUN_ID', ''),
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'architecture': 'conversion-voice-v10',
              'experience': 'final-v12',
              'verified_markers': ['data-final-ux=v12', 'production-pipeline', 'format-recommendation', 'final-experience-v12.css', 'final-experience-v12.js'],
              'critical_routes': ['/', '/direct/', '/emissions/', '/studio/', '/api/health', '/api/public/catalog', '/robots.txt', '/sitemap.xml', '/video-sitemap.xml', '/llms.txt', '/api/admin/clients', '/api/admin/client-update'],
              'outcomes': outcomes,
          }
          with open('copy-hotfix-deployment-status.json', 'w', encoding='utf-8') as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2)
              handle.write('\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            copy-hotfix-deployment-status.json \
            neptune-tv-media-cloudflare/public/index.html \
            neptune-tv-media-cloudflare/public/home-live.js \
            neptune-tv-media-cloudflare/public/landing-conversion.js \
            neptune-tv-media-cloudflare/public/styles/neptune-streaming.css \
            neptune-tv-media-cloudflare/public/app.js \
            neptune-tv-media-cloudflare/src/public-layout.js \
            neptune-tv-media-cloudflare/src/public-router.js \
            neptune-tv-media-cloudflare/package.json
          git commit -m 'chore: record Neptune final v12 deployment [skip ci]' || true
          git pull --rebase origin main || true
          git push
