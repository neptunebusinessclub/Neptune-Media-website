name: Deploy Neptune Copy Hotfix

on:
  push:
    branches: [main]
    paths:
      - 'neptune-tv-media-cloudflare/src/public-router.js'
      - 'neptune-tv-media-cloudflare/public/index.html'
      - 'neptune-tv-media-cloudflare/public/home-live.js'
      - 'neptune-tv-media-cloudflare/public/landing-conversion.js'
      - 'neptune-tv-media-cloudflare/public/styles/neptune-streaming.css'
      - 'neptune-tv-media-cloudflare/public/app.js'
      - 'neptune-tv-media-cloudflare/src/public-layout.js'
      - 'scripts/apply-home-architecture-v10.py'
      - 'scripts/cleanup-render-polish-duplicates.py'
      - '.github/workflows/deploy-neptune-copy-hotfix.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-copy-hotfix-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize generated source
        id: normalize
        working-directory: .
        run: |
          python3 scripts/cleanup-render-polish-duplicates.py
          python3 scripts/apply-home-architecture-v10.py

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        id: install
        run: npm install --package-lock=false --registry=https://registry.npmjs.org

      - name: Validate source
        id: validate
        run: npm run check

      - name: Deploy current source
        id: deploy
        run: npx wrangler deploy

      - name: Verify exact production update and critical routes
        id: verify
        run: |
          set -euo pipefail
          ready=false
          for attempt in 1 2 3 4 5 6 7 8; do
            nonce="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/?verify=$nonce" > /tmp/home.html
            if grep -q 'data-home-structure="conversion-voice-v10"' /tmp/home.html \
              && grep -q '/home-live.js?v=4' /tmp/home.html \
              && grep -q '/landing-conversion.js?v=5' /tmp/home.html \
              && grep -q 'Votre entreprise est solide' /tmp/home.html \
              && grep -q 'J’ai pas le temps de jouer à l’influenceur' /tmp/home.html; then
              ready=true
              break
            fi
            sleep 8
          done
          test "$ready" = "true"

          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/home-live.js?v=4&verify=$nonce" > /tmp/home-live.js
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/landing-conversion.js?v=5&verify=$nonce" > /tmp/landing.js
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/styles/neptune-streaming.css?v=10&verify=$nonce" > /tmp/streaming.css
          grep -q 'Les émissions restent disponibles immédiatement' /tmp/home-live.js
          grep -q 'mobile-conversion-bar' /tmp/landing.js
          grep -q 'Conversion voice architecture v10' /tmp/streaming.css
          ! grep -q 'updateHero' /tmp/landing.js
          ! grep -q '24H/24' /tmp/home-live.js

          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/direct/?verify=$nonce" > /tmp/direct.html
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/emissions/?verify=$nonce" > /tmp/emissions.html
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/studio/?verify=$nonce" -D /tmp/studio.headers > /tmp/studio.html
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/api/health?verify=$nonce" > /tmp/health.json
          curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$PUBLIC_URL/api/public/catalog?verify=$nonce" -D /tmp/catalog.headers > /tmp/catalog.json

          grep -Eq 'data-live-channel|Programmation Neptune Media|Neptune Media en direct' /tmp/direct.html
          grep -q 'Catalogue Neptune Media' /tmp/emissions.html
          grep -Eq 'studio|connexion|administration' /tmp/studio.html
          grep -qi '^x-robots-tag:.*noindex' /tmp/studio.headers
          node -e "const d=require('/tmp/health.json'); if(d.ok!==true) process.exit(1)"
          node -e "const d=require('/tmp/catalog.json'); if(!Array.isArray(d.programs)||!Array.isArray(d.episodes)||!Array.isArray(d.ads)) process.exit(1)"
          grep -qi '^cache-control:.*no-store' /tmp/catalog.headers

      - name: Record hotfix deployment result
        if: always()
        env:
          NORMALIZE_OUTCOME: ${{ steps.normalize.outcome }}
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          outcomes = {
              'normalize': os.environ.get('NORMALIZE_OUTCOME', 'unknown'),
              'install': os.environ.get('INSTALL_OUTCOME', 'unknown'),
              'validate': os.environ.get('VALIDATE_OUTCOME', 'unknown'),
              'deploy': os.environ.get('DEPLOY_OUTCOME', 'unknown'),
              'verify': os.environ.get('VERIFY_OUTCOME', 'unknown'),
          }
          report = {
              'status': 'success' if all(value == 'success' for value in outcomes.values()) else 'failed',
              'source_sha': os.environ.get('GITHUB_SHA', ''),
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'architecture': 'conversion-voice-v10',
              'home_live': 'v4',
              'landing_conversion': 'v5',
              'critical_routes': ['/', '/direct/', '/emissions/', '/studio/', '/api/health', '/api/public/catalog'],
              'outcomes': outcomes,
          }
          with open('copy-hotfix-deployment-status.json', 'w', encoding='utf-8') as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2)
              handle.write('\n')
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            copy-hotfix-deployment-status.json \
            neptune-tv-media-cloudflare/public/index.html \
            neptune-tv-media-cloudflare/public/home-live.js \
            neptune-tv-media-cloudflare/public/landing-conversion.js \
            neptune-tv-media-cloudflare/public/styles/neptune-streaming.css \
            neptune-tv-media-cloudflare/public/app.js \
            neptune-tv-media-cloudflare/src/public-layout.js \
            neptune-tv-media-cloudflare/src/public-router.js
          git commit -m 'chore: record Neptune v10 hotfix deployment [skip ci]' || true
          git pull --rebase origin main || true
          git push
