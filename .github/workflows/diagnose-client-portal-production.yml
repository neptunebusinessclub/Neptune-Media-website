name: Diagnose client portal production

on:
  push:
    paths:
      - .github/workflows/diagnose-client-portal-production.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Probe production and commit report
        shell: bash
        run: |
          set +e
          portal_code=$(curl --location --silent --output /tmp/portal.html --write-out '%{http_code}' "$PUBLIC_URL/espace-client/")
          studio_code=$(curl --location --silent --output /tmp/studio.html --write-out '%{http_code}' "$PUBLIC_URL/studio/clients")
          session_code=$(curl --silent --output /tmp/session.json --write-out '%{http_code}' "$PUBLIC_URL/api/client/session")
          request_code=$(curl --silent --output /tmp/request.json --write-out '%{http_code}' -X POST "$PUBLIC_URL/api/client/request-code" -H "Origin: $PUBLIC_URL" -H 'Content-Type: application/json' --data '{"email":"portal-smoke-test@example.invalid"}')
          admin_code=$(curl --silent --output /tmp/admin.json --write-out '%{http_code}' "$PUBLIC_URL/api/admin/clients")
          webhook_code=$(curl --silent --output /tmp/webhook.json --write-out '%{http_code}' -X POST "$PUBLIC_URL/api/webhooks/client-order" -H "Origin: $PUBLIC_URL" -H 'Content-Type: application/json' --data '{}')
          export portal_code studio_code session_code request_code admin_code webhook_code
          python3 - <<'PY'
          import json, os, pathlib, datetime
          def read(path):
              try: return pathlib.Path(path).read_text(errors='replace')[:1500]
              except Exception as exc: return f'ERROR:{exc}'
          report={
            'checked_at':datetime.datetime.now(datetime.timezone.utc).isoformat(),
            'portal':{'status':os.environ['portal_code'],'contains_expected':'Tous vos passages Neptune Media' in read('/tmp/portal.html'),'body':read('/tmp/portal.html')},
            'studio_clients':{'status':os.environ['studio_code'],'contains_expected':'Comptes, passages et livrables' in read('/tmp/studio.html'),'body':read('/tmp/studio.html')},
            'client_session':{'status':os.environ['session_code'],'body':read('/tmp/session.json')},
            'request_code':{'status':os.environ['request_code'],'body':read('/tmp/request.json')},
            'admin_clients':{'status':os.environ['admin_code'],'body':read('/tmp/admin.json')},
            'webhook':{'status':os.environ['webhook_code'],'body':read('/tmp/webhook.json')},
          }
          pathlib.Path('client-portal-production-diagnostic.json').write_text(json.dumps(report,ensure_ascii=False,indent=2))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client-portal-production-diagnostic.json
          git commit -m "chore: record client portal production diagnostic [skip ci]" || true
          git push

# Canonical route diagnostic.
