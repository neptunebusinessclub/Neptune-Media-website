name: Deploy Neptune Media to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - 'neptune-tv-media-cloudflare/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: neptune-media-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev

    steps:
      - name: Checkout canonical source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --package-lock=false --registry=https://registry.npmjs.org

      - name: Validate JavaScript
        run: npm run check

      - name: Validate Cloudflare bundle
        run: npx wrangler deploy --dry-run

      - name: Synchronize Resend secret
        if: ${{ env.RESEND_API_KEY != '' }}
        run: printf '%s' "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY

      - name: Deploy canonical Worker and assets
        run: npx wrangler deploy

      - name: Verify Resend production configuration
        working-directory: .
        run: |
          set -euo pipefail
          : > /tmp/email-health.json
          for attempt in 1 2 3 4 5 6; do
            curl --silent --show-error \
              -H 'Cache-Control: no-cache, no-store' \
              "$PUBLIC_URL/api/public/email-health?attempt=$attempt" > /tmp/email-health.json || true

            if grep -Fq '"configured":true' /tmp/email-health.json \
              && grep -Fq '"apiAuthenticated":true' /tmp/email-health.json \
              && grep -Fq '"senderDomainVerified":true' /tmp/email-health.json; then
              echo 'Resend configuration verified.'
              break
            fi

            sleep 10
          done

          cat /tmp/email-health.json
          grep -Fq '"configured":true' /tmp/email-health.json
          grep -Fq '"apiAuthenticated":true' /tmp/email-health.json
          grep -Fq '"senderDomainVerified":true' /tmp/email-health.json

      - name: Verify production hero
        working-directory: .
        run: |
          set -euo pipefail
          VERSION="${GITHUB_SHA}-${GITHUB_RUN_ID}"

          for attempt in 1 2 3 4 5 6; do
            curl --fail --silent --show-error \
              -H 'Cache-Control: no-cache, no-store' \
              "$PUBLIC_URL/hero-live-v21.js?v=$VERSION" > /tmp/hero.js || true

            if grep -Fq "expert.e dans mon domaine" /tmp/hero.js; then
              break
            fi

            sleep 10
          done

          grep -Fq "expert.e dans mon domaine" /tmp/hero.js

          curl --fail --silent --show-error \
            -H 'Cache-Control: no-cache, no-store' \
            "$PUBLIC_URL/styles/hero-live-v21.css?v=$VERSION" > /tmp/hero.css

          grep -Fq 'isolation:isolate' /tmp/hero.css
          grep -Fq 'rgba(82,185,255,.28)' /tmp/hero.css
