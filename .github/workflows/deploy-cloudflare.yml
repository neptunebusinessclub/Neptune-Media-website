name: Deploy Neptune Media to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'neptune-tv-media-cloudflare/**'
      - '.github/workflows/deploy-cloudflare.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: neptune-media-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RESEND_API: ${{ secrets.RESEND_API }}
      PUBLIC_URL: https://tv.neptunebusiness.com
      WORKERS_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
      RELEASE_ID: neptune-email-auth-20260724-v5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --package-lock=false --registry=https://registry.npmjs.org

      - name: Validate application
        run: npm run check

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Validate Resend repository secret
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          key="$(printf '%s' "${RESEND_API:-}" | tr -d '\r\n' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g; s/^[Bb]earer[[:space:]]+//; s/^"(.*)"$/\1/; s/^'\''(.*)'\''$/\1/')"

          if [ -z "$key" ]; then
            echo 'GitHub repository secret RESEND_API is missing.' >&2
            exit 1
          fi

          if [[ "$key" != re_* ]]; then
            echo 'GitHub repository secret RESEND_API does not look like a Resend API key.' >&2
            exit 1
          fi

          status="$(curl --silent --show-error --output /tmp/resend-auth.json --write-out '%{http_code}' \
            -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $key" \
            -H 'Content-Type: application/json' \
            -H 'User-Agent: Neptune-Media-Deploy/4.0.0' \
            --data '{}')"
          cat /tmp/resend-auth.json

          if [ "$status" != '400' ] && [ "$status" != '422' ]; then
            echo "Resend rejected RESEND_API with HTTP $status." >&2
            exit 1
          fi

          printf '%s' "$key" > /tmp/resend-api-key
          chmod 600 /tmp/resend-api-key

      - name: Replace Cloudflare RESEND_API_KEY
        run: npx wrangler secret put RESEND_API_KEY < /tmp/resend-api-key

      - name: Deploy Worker and assets
        run: npx wrangler deploy

      - name: Verify deployed release
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          for base in "$WORKERS_URL" "$PUBLIC_URL"; do
            for attempt in 1 2 3 4 5 6; do
              curl --silent --show-error -H 'Cache-Control: no-cache, no-store' \
                "$base/api/public/release?attempt=$attempt" > /tmp/release.json || true
              if grep -Fq "\"release\":\"$RELEASE_ID\"" /tmp/release.json \
                && grep -Fq '"resendSecretPresent":true' /tmp/release.json; then
                break
              fi
              sleep 10
            done
            cat /tmp/release.json
            grep -Fq "\"release\":\"$RELEASE_ID\"" /tmp/release.json
            grep -Fq '"resendSecretPresent":true' /tmp/release.json
          done

      - name: Verify Resend authentication from production
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          curl --silent --show-error -H 'Cache-Control: no-cache, no-store' \
            "$PUBLIC_URL/api/public/email-health?release=$GITHUB_SHA" > /tmp/email-health.json
          cat /tmp/email-health.json
          grep -Fq '"configured":true' /tmp/email-health.json
          grep -Fq '"providerKeyAccepted":true' /tmp/email-health.json

      - name: Exercise client login email delivery
        working-directory: .
        shell: bash
        run: |
          set -euo pipefail
          curl --silent --show-error \
            -X POST "$PUBLIC_URL/api/client/request-code" \
            -H "Origin: $PUBLIC_URL" \
            -H 'Content-Type: application/json' \
            -H 'Cache-Control: no-cache, no-store' \
            --data '{"email":"contact@neptunebusiness.com"}' > /tmp/client-code.json
          cat /tmp/client-code.json
          grep -Fq '"ok":true' /tmp/client-code.json
          if ! grep -Fq '"delivered":true' /tmp/client-code.json \
            && ! grep -Fq '"retryAfter":' /tmp/client-code.json; then
            echo 'Client login email delivery was not confirmed.' >&2
            exit 1
          fi
