name: Deploy Neptune Media to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-media-production
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOOTSTRAP_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
      CONVERSION_WEBHOOK_SECRET: ${{ secrets.CONVERSION_WEBHOOK_SECRET }}
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies from public npm registry
        run: npm install --package-lock=false --registry=https://registry.npmjs.org

      - name: Validate JavaScript
        run: npm run check

      - name: Validate Cloudflare bundle
        run: npx wrangler deploy --dry-run

      - name: Create or update Worker and assets
        run: npx wrangler deploy

      - name: Configure bootstrap secret
        run: printf '%s' "$BOOTSTRAP_TOKEN" | npx wrangler secret put BOOTSTRAP_TOKEN

      - name: Configure conversion webhook secret
        if: ${{ env.CONVERSION_WEBHOOK_SECRET != '' }}
        run: printf '%s' "$CONVERSION_WEBHOOK_SECRET" | npx wrangler secret put CONVERSION_WEBHOOK_SECRET

      - name: Final deployment verification
        run: npx wrangler deploy

      - name: Smoke test production routes
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error "$PUBLIC_URL/api/health" > /tmp/health.json; then
              break
            fi
            sleep 10
          done
          grep -q '"ok":true' /tmp/health.json
          curl --fail --silent --show-error "$PUBLIC_URL/" | grep -q 'Votre entreprise ne mérite pas une vidéo de plus'
          curl --fail --silent --show-error "$PUBLIC_URL/emissions/" | grep -q 'Des histoires d’entreprise qui méritent l’antenne'
          curl --fail --silent --show-error "$PUBLIC_URL/robots.txt" | grep -q 'video-sitemap.xml'
          curl --fail --silent --show-error "$PUBLIC_URL/sitemap.xml" | grep -q '/emissions/'
          curl --fail --silent --show-error "$PUBLIC_URL/video-sitemap.xml" | grep -q 'video:video'
          curl --fail --silent --show-error "$PUBLIC_URL/studio/" | grep -q 'Neptune Media Studio Admin'

      - name: Record successful production deployment
        env:
          SOURCE_SHA: ${{ github.sha }}
        run: |
          cd "$GITHUB_WORKSPACE"
          printf '{"status":"success","source_sha":"%s","deployed_at":"%s","url":"%s"}\n' "$SOURCE_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$PUBLIC_URL" > deployment-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-status.json
          git commit -m "chore: record successful deployment [skip ci]"
          git push
