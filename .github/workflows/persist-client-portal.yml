name: Persist client portal implementation

on:
  push:
    paths:
      - .github/workflows/persist-client-portal.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: persist-client-portal
  cancel-in-progress: false

jobs:
  persist:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate base client portal
        shell: bash
        run: |
          set -euo pipefail
          awk "/python3 <<'PY'/{flag=1;next} /^          PY$/{flag=0} flag{sub(/^          /,\"\"); print}" .github/workflows/build-client-portal.yml > /tmp/build_client_portal.py
          test -s /tmp/build_client_portal.py
          python3 /tmp/build_client_portal.py

      - name: Apply permanent multi-order upgrade
        shell: bash
        run: |
          set -euo pipefail
          awk "/python3 <<'PY'/{flag=1;next} /^          PY$/{flag=0} flag{sub(/^          /,\"\"); print}" .github/workflows/upgrade-client-account.yml > /tmp/upgrade_client_account.py
          test -s /tmp/upgrade_client_account.py
          python3 /tmp/upgrade_client_account.py

      - name: Validate generated application
        shell: bash
        run: |
          set -euo pipefail
          cd neptune-tv-media-cloudflare
          npm install --package-lock=false --registry=https://registry.npmjs.org
          npm run check
          test -f public/espace-client/index.html
          test -f public/espace-client/client.js
          test -f public/espace-client/client.css
          grep -q "'/api/webhooks/client-order'" src/index.js
          grep -q "async clientOrderUpsert" src/store.js
          grep -q "Réserver à nouveau" public/espace-client/client.js

      - name: Commit generated source durably
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add neptune-tv-media-cloudflare/src/store.js \
                  neptune-tv-media-cloudflare/src/index.js \
                  neptune-tv-media-cloudflare/public/studio/index.html \
                  neptune-tv-media-cloudflare/public/studio/studio.js \
                  neptune-tv-media-cloudflare/public/espace-client/index.html \
                  neptune-tv-media-cloudflare/public/espace-client/client.js \
                  neptune-tv-media-cloudflare/public/espace-client/client.css
          git commit -m "feat: persist permanent multi-order client portal"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin HEAD:main; then
              exit 0
            fi
            sleep $((attempt * 3))
          done
          echo "Unable to push generated portal after retries" >&2
          exit 1

# Triggered after the workflow was present on the default branch.
