name: Validate render polish

on:
  push:
    branches: [main]
    paths:
      - scripts/apply-render-polish.py
      - scripts/apply-render-polish-v5.py
      - scripts/apply-render-polish-v6.py
      - .github/workflows/validate-render-polish.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run source polishers and syntax checks
        shell: bash
        run: |
          set +e
          {
            python3 scripts/apply-render-polish.py
            v4_status=$?
            python3 scripts/apply-render-polish-v5.py
            v5_status=$?
            python3 scripts/apply-render-polish-v6.py
            v6_status=$?
            if test "$v4_status" = "0" -a "$v5_status" = "0" -a "$v6_status" = "0"; then
              cd neptune-tv-media-cloudflare
              npm run check
              check_status=$?
              cd ..
            else
              check_status=99
            fi
            test "$v4_status" = "0" -a "$v5_status" = "0" -a "$v6_status" = "0" -a "$check_status" = "0"
          } > /tmp/render-polish.log 2>&1
          status=$?
          STATUS="$status" python3 - <<'PY'
          import json, os
          from datetime import datetime, timezone
          log = open('/tmp/render-polish.log', encoding='utf-8').read()
          report = {
              'checked_at': datetime.now(timezone.utc).isoformat(),
              'ready': os.environ['STATUS'] == '0',
              'status': int(os.environ['STATUS']),
              'version': 'v6',
              'log': log[-16000:]
          }
          with open('render-polish-source-validation.json', 'w', encoding='utf-8') as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2)
              handle.write('\n')
          PY
      - name: Record validation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add render-polish-source-validation.json
          git commit -m "chore: record render polish v6 validation [skip ci]" || true
          git pull --rebase origin main || true
          git push || true
