name: Import Neptune launch emissions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/import-launch-emissions.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-media-import
  cancel-in-progress: true

jobs:
  import-media:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOOTSTRAP_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
      R2_BUCKET: neptune-media-assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --package-lock=false --registry=https://registry.npmjs.org
      - run: npx wrangler r2 bucket create "$R2_BUCKET" 2>/dev/null || true
      - name: Download, publish and register the two emissions
        run: bash scripts/import-launch-media.sh
      - name: Record media import status
        if: always()
        env:
          IMPORT_STATUS: ${{ job.status }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          cd "$GITHUB_WORKSPACE"
          printf '{"status":"%s","source_sha":"%s","checked_at":"%s","catalog":"%s/api/public/catalog","direct":"%s/direct/"}\n' "$IMPORT_STATUS" "$SOURCE_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$PUBLIC_URL" "$PUBLIC_URL" > media-import-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media-import-status.json
          git commit -m "chore: record media import status [skip ci]" || true
          git pull --rebase origin main || true
          git push || true
