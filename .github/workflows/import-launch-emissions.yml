# Relance après activation du partage public Drive — 2026-07-16
name: Import Neptune launch emissions

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/import-launch-emissions.yml'
      - 'neptune-tv-media-cloudflare/scripts/import-launch-media.sh'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-media-import
  cancel-in-progress: true

jobs:
  import-media:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: neptune-tv-media-cloudflare
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BOOTSTRAP_TOKEN: ${{ secrets.BOOTSTRAP_TOKEN }}
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
      R2_BUCKET: neptune-media-assets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --package-lock=false --registry=https://registry.npmjs.org
      - run: npx wrangler r2 bucket create "$R2_BUCKET" 2>/dev/null || true
      - name: Download, publish and register the two emissions
        id: media_import
        shell: bash
        run: |
          set +e
          bash scripts/import-launch-media.sh 2>&1 | tee /tmp/media-import.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"
      - name: Record media import status
        if: always()
        env:
          IMPORT_STATUS: ${{ job.status }}
          SOURCE_SHA: ${{ github.sha }}
          EXIT_CODE: ${{ steps.media_import.outputs.exit_code }}
        run: |
          cd "$GITHUB_WORKSPACE"
          tail -c 6000 /tmp/media-import.log 2>/dev/null > /tmp/media-import-tail.log || true
          jq -n \
            --arg status "$IMPORT_STATUS" \
            --arg source_sha "$SOURCE_SHA" \
            --arg checked_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg exit_code "${EXIT_CODE:-unknown}" \
            --arg catalog "$PUBLIC_URL/api/public/catalog" \
            --arg direct "$PUBLIC_URL/direct/" \
            --rawfile log /tmp/media-import-tail.log \
            '{status:$status,source_sha:$source_sha,checked_at:$checked_at,exit_code:$exit_code,catalog:$catalog,direct:$direct,log:$log}' > media-import-status.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add media-import-status.json
          git commit -m "chore: record media import status [skip ci]" || true
          git pull --rebase origin main || true
          git push || true
