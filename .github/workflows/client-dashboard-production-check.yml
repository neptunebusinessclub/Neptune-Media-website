name: Client Dashboard Production Check

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/production-check-trigger'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-production:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'verify/client-dashboard-production'
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Verify public dashboard assets
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="https://neptune-media-webtv.neptunebusinessclub.workers.dev"
          mkdir -p production-check

          for attempt in $(seq 1 30); do
            stamp="$(date +%s)"
            echo "Production check ${attempt}/30"

            curl -fsS -H 'Cache-Control: no-cache' "${BASE_URL}/espace-client/?dashboard_check=${stamp}" > production-check/index.html || true
            curl -fsS -H 'Cache-Control: no-cache' "${BASE_URL}/espace-client/dashboard-v37.css?dashboard_check=${stamp}" > production-check/dashboard-v37.css || true
            curl -fsS -H 'Cache-Control: no-cache' "${BASE_URL}/espace-client/dashboard-v37-base.css?dashboard_check=${stamp}" > production-check/dashboard-v37-base.css || true

            if grep -q 'class="dashboard dashboard-v37"' production-check/index.html \
              && grep -q '/espace-client/dashboard-v37.css' production-check/index.html \
              && grep -q 'Projet en cours' production-check/index.html \
              && grep -q 'En un coup d’œil' production-check/index.html \
              && grep -q 'Réserver un autre format' production-check/index.html \
              && grep -q 'dashboard-v37-base.css' production-check/dashboard-v37.css \
              && grep -q '.production-card' production-check/dashboard-v37-base.css \
              && grep -q '.metric-grid' production-check/dashboard-v37-base.css \
              && grep -q '.format-grid' production-check/dashboard-v37-base.css; then
              echo 'Neptune Media client dashboard v37 is live.' | tee production-check/result.txt
              exit 0
            fi

            sleep 15
          done

          echo 'The public URL did not expose the complete dashboard v37 bundle.' | tee production-check/result.txt
          exit 1

      - name: Upload production evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-dashboard-production-check
          path: production-check
          if-no-files-found: warn
          retention-days: 7
