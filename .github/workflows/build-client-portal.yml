              )
              studio_js = studio_js.replace(
                  "  bindDynamicEvents();",
                  "  bindDynamicEvents();\n  $('#clientProjectForm')?.addEventListener('submit', saveClientProject);",
                  1,
              )

          portal_html = '''<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Mon espace Neptune Media</title><link rel="icon" href="/assets/logo-neptune.svg"><link rel="stylesheet" href="/espace-client/client.css"></head>
<body><main class="wrap"><header><img src="/assets/logo-neptune.svg" alt="Neptune"><a href="/">Web TV</a></header>
<section id="login" class="card auth"><p class="eyebrow">ESPACE CLIENT</p><h1>Suivez votre projet. Récupérez vos livrables.</h1><p>Entrez l’adresse utilisée lors de votre réservation. Aucun mot de passe.</p><form id="emailForm"><label>E-mail<input id="email" type="email" autocomplete="email" required></label><button>Recevoir mon code</button></form><form id="codeForm" hidden><label>Code à 6 chiffres<input id="code" inputmode="numeric" maxlength="6" pattern="[0-9]{6}" required></label><button>Accéder à mon espace</button></form><p id="message" class="message"></p></section>
<section id="portal" hidden><div class="hero card"><div><p class="eyebrow">VOTRE PARCOURS NEPTUNE</p><h1 id="welcome"></h1><p id="company"></p></div><button id="logout" class="ghost">Déconnexion</button></div><div id="projects"></div></section>
</main><script type="module" src="/espace-client/client.js"></script></body></html>'''
          portal_css = ''':root{color-scheme:dark;font-family:Inter,ui-sans-serif,system-ui;background:#050914;color:#f7f8ff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,#17244d 0,transparent 35%),#050914}.wrap{width:min(980px,calc(100% - 28px));margin:auto;padding:24px 0 60px}header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}header img{width:62px;height:46px;object-fit:contain}header a,.ghost{color:#fff;text-decoration:none;border:1px solid #33415f;background:#0b1222;padding:12px 18px;border-radius:14px}.card{background:linear-gradient(145deg,rgba(17,30,58,.96),rgba(7,13,27,.96));border:1px solid #2a3858;border-radius:28px;padding:clamp(22px,5vw,48px);box-shadow:0 30px 80px rgba(0,0,0,.34)}.auth{max-width:620px;margin:8vh auto}.eyebrow{font-size:.78rem;letter-spacing:.16em;font-weight:800;color:#9eb2da}h1{font-size:clamp(2rem,7vw,4.6rem);line-height:.95;margin:.35em 0}label{display:grid;gap:8px;font-weight:700;margin:24px 0}input{width:100%;padding:17px;border-radius:14px;border:1px solid #33415f;background:#050b17;color:#fff;font-size:1.05rem}button{border:0;border-radius:14px;padding:16px 20px;font-weight:800;font-size:1rem;color:#fff;background:linear-gradient(100deg,#4a91ff,#8a56ff,#ee42bc);cursor:pointer}.message{min-height:24px;color:#9fd8c0}.hero{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}.hero h1{font-size:clamp(2.2rem,6vw,4.5rem)}.project{margin:18px 0}.project-head{display:flex;justify-content:space-between;gap:20px;align-items:flex-start}.badge{padding:8px 12px;border-radius:999px;background:#17284c;color:#bcd0ff;font-weight:800}.next{padding:18px;border-radius:18px;background:#121d35;margin:20px 0}.timeline{display:grid;gap:10px;margin:24px 0}.step{display:grid;grid-template-columns:20px 1fr;gap:12px;align-items:start;padding:12px 0;border-bottom:1px solid #25324d}.dot{width:14px;height:14px;border-radius:50%;background:#39445b;margin-top:4px}.done .dot{background:#4ce0a5}.current .dot{background:#ff4fc8;box-shadow:0 0 0 6px rgba(255,79,200,.13)}.files{display:grid;gap:10px}.file{display:flex;justify-content:space-between;align-items:center;padding:15px;border:1px solid #2a3858;border-radius:16px;text-decoration:none;color:#fff;background:#091121}.empty{color:#96a3bd;padding:18px 0}@media(max-width:620px){.hero,.project-head{display:block}.ghost{margin-top:16px}.card{border-radius:22px;padding:22px}h1{line-height:1.02}}'''
          portal_js = r'''const $=s=>document.querySelector(s);let email='';
$('#emailForm').addEventListener('submit',async e=>{e.preventDefault();email=$('#email').value.trim().toLowerCase();setMessage('Envoi du code…');try{await api('/api/client/request-code',{method:'POST',body:JSON.stringify({email})});$('#emailForm').hidden=true;$('#codeForm').hidden=false;setMessage('Code envoyé. Vérifiez votre boîte e-mail.');$('#code').focus()}catch(err){setMessage(errorText(err.message))}});
$('#codeForm').addEventListener('submit',async e=>{e.preventDefault();try{await api('/api/client/verify-code',{method:'POST',body:JSON.stringify({email,code:$('#code').value})});await load()}catch(err){setMessage(errorText(err.message))}});
$('#logout').addEventListener('click',async()=>{await api('/api/client/logout',{method:'POST'}).catch(()=>{});location.reload()});
async function api(url,options={}){const headers={Accept:'application/json',...(options.headers||{})};if(options.body)headers['Content-Type']='application/json';const r=await fetch(url,{...options,headers});const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.error||`http_${r.status}`);return d}
async function load(){try{const data=await api('/api/client/status');$('#login').hidden=true;$('#portal').hidden=false;$('#welcome').textContent=data.client.fullName?`Bonjour ${data.client.fullName}`:'Votre espace client';$('#company').textContent=data.client.company||data.client.email;$('#projects').innerHTML=data.projects.length?data.projects.map(projectHtml).join(''):'<div class="card empty">Votre dossier est créé. Les étapes apparaîtront ici.</div>'}catch{$('#login').hidden=false;$('#portal').hidden=true}}
function projectHtml(p){const steps=(p.steps||[]).map(s=>`<div class="step ${esc(s.state)}"><span class="dot"></span><div><b>${esc(s.label)}</b>${s.note?`<p>${esc(s.note)}</p>`:''}</div></div>`).join('');const files=(p.files||[]).length?p.files.map(f=>`<a class="file" href="${esc(f.url)}" target="_blank" rel="noopener"><span><b>${esc(f.name)}</b><small> · ${esc(f.fileType)} ${esc(f.sizeLabel)}</small></span><strong>Télécharger</strong></a>`).join(''):'<p class="empty">Aucun livrable disponible pour le moment.</p>';return `<article class="project card"><div class="project-head"><div><p class="eyebrow">${esc(p.format||'PROJET NEPTUNE')}</p><h2>${esc(p.title)}</h2></div><span class="badge">${esc(statusText(p.status))}</span></div>${p.nextAction?`<div class="next"><small>PROCHAINE ACTION</small><p>${esc(p.nextAction)}</p></div>`:''}<h3>Votre progression</h3><div class="timeline">${steps}</div><h3>Vos fichiers</h3><div class="files">${files}</div></article>`}
function statusText(s){return({reservation_confirmed:'Réservation confirmée',preparation:'Préparation',filming:'Tournage',editing:'Montage',approval:'Validation',delivered:'Livré',done:'Terminé'})[s]||s}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function setMessage(v){$('#message').textContent=v}function errorText(e){return({invalid_or_expired_code:'Code invalide ou expiré.',invalid_code:'Entrez les 6 chiffres.',email_send_failed:"L’e-mail n’a pas pu être envoyé.",email_service_not_configured:"Le service e-mail n’est pas configuré."})[e]||'Une erreur est survenue.'}load();'''

