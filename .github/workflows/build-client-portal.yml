      - name: Validate and deploy
        run: |
          cd neptune-tv-media-cloudflare
          npm install --package-lock=false --registry=https://registry.npmjs.org
          npm run check
          npx wrangler deploy

      - name: Smoke test client portal
        run: |
          sleep 8
          curl --fail --silent --show-error https://neptune-media-webtv.neptunebusinessclub.workers.dev/espace-client/ | grep -q 'Mon espace Neptune Media'

      - name: Commit implementation
        shell: bash
        run: |
          rm .github/workflows/build-client-portal.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add passwordless client portal and project tracking"
