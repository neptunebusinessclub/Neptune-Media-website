name: Build secure client portal

on:
  push:
    paths:
      - .github/workflows/build-client-portal.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build portal and backend
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          root = Path('neptune-tv-media-cloudflare')
          store_path = root / 'src/store.js'
          index_path = root / 'src/index.js'
          studio_html_path = root / 'public/studio/index.html'
          studio_js_path = root / 'public/studio/studio.js'
          portal_dir = root / 'public/espace-client'
          portal_dir.mkdir(parents=True, exist_ok=True)

          store = store_path.read_text()
          index = index_path.read_text()
          studio_html = studio_html_path.read_text()
          studio_js = studio_js_path.read_text()

          if "const CLIENT_CODE_TTL_SECONDS" not in store:
              store = store.replace(
                  "const SESSION_TTL_SECONDS = 12 * 60 * 60;",
                  "const SESSION_TTL_SECONDS = 12 * 60 * 60;\nconst CLIENT_CODE_TTL_SECONDS = 10 * 60;\nconst CLIENT_SESSION_TTL_SECONDS = 12 * 60 * 60;",
                  1,
              )

          if "CREATE TABLE IF NOT EXISTS clients" not in store:
              anchor = "      CREATE TABLE IF NOT EXISTS login_attempts (\n        key TEXT PRIMARY KEY,\n        count INTEGER NOT NULL,\n        first_at TEXT NOT NULL,\n        last_at TEXT NOT NULL\n      );"
              addition = anchor + """
      CREATE TABLE IF NOT EXISTS clients (
        id TEXT PRIMARY KEY,
        email TEXT NOT NULL UNIQUE,
        full_name TEXT NOT NULL DEFAULT '',
        company TEXT NOT NULL DEFAULT '',
        active INTEGER NOT NULL DEFAULT 1,
        created_at TEXT NOT NULL,
        updated_at TEXT NOT NULL
      );
      CREATE TABLE IF NOT EXISTS client_projects (
        id TEXT PRIMARY KEY,
        client_id TEXT NOT NULL REFERENCES clients(id) ON DELETE CASCADE,
        title TEXT NOT NULL,
        format TEXT NOT NULL DEFAULT '',
        status TEXT NOT NULL DEFAULT 'reservation_confirmed',
        appointment_at TEXT,
        filming_at TEXT,
        next_action TEXT NOT NULL DEFAULT '',
        created_at TEXT NOT NULL,
        updated_at TEXT NOT NULL
      );
      CREATE TABLE IF NOT EXISTS client_steps (
        id TEXT PRIMARY KEY,
        project_id TEXT NOT NULL REFERENCES client_projects(id) ON DELETE CASCADE,
        step_key TEXT NOT NULL,
        label TEXT NOT NULL,
        state TEXT NOT NULL DEFAULT 'pending',
        display_order INTEGER NOT NULL DEFAULT 100,
        completed_at TEXT,
        note TEXT NOT NULL DEFAULT ''
      );
      CREATE TABLE IF NOT EXISTS client_files (
        id TEXT PRIMARY KEY,
        project_id TEXT NOT NULL REFERENCES client_projects(id) ON DELETE CASCADE,
        name TEXT NOT NULL,
        file_type TEXT NOT NULL DEFAULT 'livrable',
        url TEXT NOT NULL,
        size_label TEXT NOT NULL DEFAULT '',
        created_at TEXT NOT NULL
      );
      CREATE TABLE IF NOT EXISTS client_codes (
        id TEXT PRIMARY KEY,
        email TEXT NOT NULL,
        code_hash TEXT NOT NULL,
        expires_at TEXT NOT NULL,
        created_at TEXT NOT NULL,
        used_at TEXT
      );
      CREATE TABLE IF NOT EXISTS client_sessions (
        id TEXT PRIMARY KEY,
        client_id TEXT NOT NULL REFERENCES clients(id) ON DELETE CASCADE,
        token_hash TEXT NOT NULL UNIQUE,
        expires_at TEXT NOT NULL,
        created_at TEXT NOT NULL,
        last_seen_at TEXT NOT NULL
      );
      CREATE INDEX IF NOT EXISTS idx_client_projects_client ON client_projects(client_id, created_at DESC);
      CREATE INDEX IF NOT EXISTS idx_client_steps_project ON client_steps(project_id, display_order);
      CREATE INDEX IF NOT EXISTS idx_client_files_project ON client_files(project_id, created_at DESC);
      CREATE INDEX IF NOT EXISTS idx_client_sessions_token ON client_sessions(token_hash);"""
              if anchor not in store:
                  raise SystemExit('schema anchor missing')
              store = store.replace(anchor, addition, 1)

          route_anchor = "    if (url.pathname === '/auth/login' && method === 'POST') return this.login(body);"
          if "'/client/request-code'" not in store:
              routes = """    if (url.pathname === '/client/request-code' && method === 'POST') return this.clientRequestCode(body);
    if (url.pathname === '/client/verify-code' && method === 'POST') return this.clientVerifyCode(body);
    if (url.pathname === '/client/session' && method === 'POST') return this.clientSession(body);
    if (url.pathname === '/client/logout' && method === 'POST') return this.clientLogout(body);
    if (url.pathname === '/client/admin-save' && method === 'POST') return this.clientAdminSave(body);
"""
              if route_anchor not in store:
                  raise SystemExit('store route anchor missing')
              store = store.replace(route_anchor, routes + route_anchor, 1)

          if "async clientRequestCode(body)" not in store:
              marker = "  async login(body) {"
              methods = r'''  async clientRequestCode(body) {
    const email = normalizeEmail(body.email);
    const client = this.sql.exec('SELECT id,active FROM clients WHERE email=?', email).toArray()[0];
    if (!client || Number(client.active) !== 1) return json({ ok: true });
    const code = String(crypto.getRandomValues(new Uint32Array(1))[0] % 1000000).padStart(6, '0');
    const codeHash = await sha256(`${email}:${code}`);
    const now = new Date();
    const expiresAt = new Date(now.getTime() + CLIENT_CODE_TTL_SECONDS * 1000).toISOString();
    this.sql.exec('DELETE FROM client_codes WHERE email=? OR expires_at<? OR used_at IS NOT NULL', email, now.toISOString());
    this.sql.exec(
      'INSERT INTO client_codes (id,email,code_hash,expires_at,created_at,used_at) VALUES (?,?,?,?,?,NULL)',
      crypto.randomUUID(), email, codeHash, expiresAt, now.toISOString(),
    );
    return json({ ok: true, code, expiresIn: CLIENT_CODE_TTL_SECONDS });
  }

  async clientVerifyCode(body) {
    const email = normalizeEmail(body.email);
    const code = String(body.code || '').replace(/\D/g, '').slice(0, 6);
    if (!email || code.length !== 6) return json({ error: 'invalid_code' }, 400);
    const codeHash = await sha256(`${email}:${code}`);
    const now = new Date();
    const entry = this.sql.exec(
      'SELECT id FROM client_codes WHERE email=? AND code_hash=? AND used_at IS NULL AND expires_at>? ORDER BY created_at DESC LIMIT 1',
      email, codeHash, now.toISOString(),
    ).toArray()[0];
    if (!entry) return json({ error: 'invalid_or_expired_code' }, 401);
    const client = this.sql.exec('SELECT id,email,full_name AS fullName,company FROM clients WHERE email=? AND active=1', email).toArray()[0];
    if (!client) return json({ error: 'unauthorized' }, 401);
    this.sql.exec('UPDATE client_codes SET used_at=? WHERE id=?', now.toISOString(), entry.id);
    const token = randomToken(32);
    const tokenHash = await sha256(token);
    const expiresAt = new Date(now.getTime() + CLIENT_SESSION_TTL_SECONDS * 1000).toISOString();
    this.sql.exec(
      'INSERT INTO client_sessions (id,client_id,token_hash,expires_at,created_at,last_seen_at) VALUES (?,?,?,?,?,?)',
      crypto.randomUUID(), client.id, tokenHash, expiresAt, now.toISOString(), now.toISOString(),
    );
    return json({ ok: true, token, expiresIn: CLIENT_SESSION_TTL_SECONDS, client });
  }

  async clientSession(body) {
    const tokenHash = await sha256(String(body.token || ''));
    const now = new Date().toISOString();
    const client = this.sql.exec(
      `SELECT c.id,c.email,c.full_name AS fullName,c.company,s.id AS sessionId
       FROM client_sessions s JOIN clients c ON c.id=s.client_id
       WHERE s.token_hash=? AND s.expires_at>? AND c.active=1`,
      tokenHash, now,
    ).toArray()[0];
    if (!client) return json({ error: 'unauthorized' }, 401);
    this.sql.exec('UPDATE client_sessions SET last_seen_at=? WHERE id=?', now, client.sessionId);
    const projects = this.sql.exec(
      `SELECT id,title,format,status,appointment_at AS appointmentAt,filming_at AS filmingAt,
              next_action AS nextAction,created_at AS createdAt,updated_at AS updatedAt
       FROM client_projects WHERE client_id=? ORDER BY created_at DESC`,
      client.id,
    ).toArray();
    for (const project of projects) {
      project.steps = this.sql.exec(
        `SELECT id,step_key AS stepKey,label,state,display_order AS displayOrder,completed_at AS completedAt,note
         FROM client_steps WHERE project_id=? ORDER BY display_order ASC`, project.id,
      ).toArray();
      project.files = this.sql.exec(
        `SELECT id,name,file_type AS fileType,url,size_label AS sizeLabel,created_at AS createdAt
         FROM client_files WHERE project_id=? ORDER BY created_at DESC`, project.id,
      ).toArray();
    }
    delete client.sessionId;
    return json({ authenticated: true, client, projects });
  }

  async clientLogout(body) {
    if (body.token) {
      const tokenHash = await sha256(String(body.token));
      this.sql.exec('DELETE FROM client_sessions WHERE token_hash=?', tokenHash);
    }
    return json({ ok: true });
  }

  async clientAdminSave(body) {
    const actor = await this.requireSession(body.token);
    if (!actor || actor.role !== 'admin') return json({ error: 'unauthorized' }, 401);
    if (body.csrfToken !== actor.csrfToken) return json({ error: 'csrf_failed' }, 403);
    const payload = body.payload && typeof body.payload === 'object' ? body.payload : {};
    const email = normalizeEmail(payload.email);
    if (!email) return json({ error: 'email_required' }, 400);
    const now = new Date().toISOString();
    let client = this.sql.exec('SELECT id FROM clients WHERE email=?', email).toArray()[0];
    if (!client) {
      client = { id: crypto.randomUUID() };
      this.sql.exec(
        'INSERT INTO clients (id,email,full_name,company,active,created_at,updated_at) VALUES (?,?,?,?,1,?,?)',
        client.id, email, sanitizeText(payload.fullName, 120), sanitizeText(payload.company, 160), now, now,
      );
    } else {
      this.sql.exec(
        'UPDATE clients SET full_name=?,company=?,active=1,updated_at=? WHERE id=?',
        sanitizeText(payload.fullName, 120), sanitizeText(payload.company, 160), now, client.id,
      );
    }
    const projectId = sanitizeText(payload.projectId, 80) || crypto.randomUUID();
    const existing = this.sql.exec('SELECT id FROM client_projects WHERE id=?', projectId).toArray()[0];
    if (!existing) {
      this.sql.exec(
        `INSERT INTO client_projects (id,client_id,title,format,status,appointment_at,filming_at,next_action,created_at,updated_at)
         VALUES (?,?,?,?,?,?,?,?,?,?)`,
        projectId, client.id, sanitizeText(payload.title, 180) || 'Projet Neptune Media',
        sanitizeText(payload.format, 80), sanitizeText(payload.status, 80) || 'reservation_confirmed',
        payload.appointmentAt || null, payload.filmingAt || null, sanitizeText(payload.nextAction, 300), now, now,
      );
      const steps = [
        ['reservation','Réservation effectuée'],['appointment','Rendez-vous confirmé'],['preparation','Préparation de l’interview'],
        ['filming','Tournage planifié'],['shot','Tournage réalisé'],['editing','Montage en cours'],
        ['approval','Validation demandée'],['delivery','Livrables disponibles'],['done','Projet terminé'],
      ];
      for (let i = 0; i < steps.length; i++) {
        this.sql.exec(
          'INSERT INTO client_steps (id,project_id,step_key,label,state,display_order,completed_at,note) VALUES (?,?,?,?,?,?,NULL,?)',
          crypto.randomUUID(), projectId, steps[i][0], steps[i][1], i < 2 ? 'done' : (i === 2 ? 'current' : 'pending'), (i + 1) * 10, '',
        );
      }
    } else {
      this.sql.exec(
        `UPDATE client_projects SET title=?,format=?,status=?,appointment_at=?,filming_at=?,next_action=?,updated_at=? WHERE id=? AND client_id=?`,
        sanitizeText(payload.title, 180), sanitizeText(payload.format, 80), sanitizeText(payload.status, 80),
        payload.appointmentAt || null, payload.filmingAt || null, sanitizeText(payload.nextAction, 300), now, projectId, client.id,
      );
    }
    return json({ ok: true, clientId: client.id, projectId });
  }

'''
              if marker not in store:
                  raise SystemExit('login anchor missing')
              store = store.replace(marker, methods + marker, 1)

          if "'/api/client/request-code'" not in index:
              anchor = "      if (url.pathname === '/api/auth/bootstrap' && request.method === 'POST') {"
              routes = r'''      if (url.pathname === '/api/client/request-code' && request.method === 'POST') {
        if (!isSameOrigin(request)) return withSecurity(json({ error: 'origin_forbidden' }, 403));
        const payload = await request.json().catch(() => ({}));
        const email = String(payload.email || '').trim().toLowerCase();
        const response = await callStore(studio, '/client/request-code', { email });
        const result = await response.json().catch(() => ({}));
        if (result.code) {
          const sent = await sendClientCodeEmail(env, email, result.code);
          if (!sent.ok) return withSecurity(json({ error: sent.error }, 503));
        }
        return withSecurity(json({ ok: true }));
      }

      if (url.pathname === '/api/client/verify-code' && request.method === 'POST') {
        if (!isSameOrigin(request)) return withSecurity(json({ error: 'origin_forbidden' }, 403));
        const payload = await request.json().catch(() => ({}));
        const response = await callStore(studio, '/client/verify-code', payload);
        const data = await response.json().catch(() => ({}));
        if (!response.ok) return withSecurity(json(data, response.status));
        return withSecurity(json(data, 200, {
          'Set-Cookie': clientSessionCookie(data.token, request.url, data.expiresIn),
        }));
      }

      if (url.pathname === '/api/client/status' && request.method === 'GET') {
        const token = clientSessionToken(request);
        if (!token) return withSecurity(json({ authenticated: false }, 401));
        return withSecurity(await callStore(studio, '/client/session', { token }));
      }

      if (url.pathname === '/api/client/logout' && request.method === 'POST') {
        if (!isSameOrigin(request)) return withSecurity(json({ error: 'origin_forbidden' }, 403));
        const token = clientSessionToken(request);
        if (token) await callStore(studio, '/client/logout', { token });
        return withSecurity(json({ ok: true }, 200, { 'Set-Cookie': clearClientSessionCookie(request.url) }));
      }

      if (url.pathname === '/api/admin/client-save' && request.method === 'POST') {
        const auth = await authenticatedRequest(request, studio, true);
        if (!auth.ok) return withSecurity(auth.response);
        const payload = await request.json().catch(() => ({}));
        return withSecurity(await callStore(studio, '/client/admin-save', {
          token: auth.token, csrfToken: auth.csrfToken, payload,
        }));
      }

'''
              if anchor not in index:
                  raise SystemExit('index route anchor missing')
              index = index.replace(anchor, routes + anchor, 1)

          if "async function sendClientCodeEmail" not in index:
              anchor = "async function sendResetEmail(env, requestUrl, token) {"
              helper = r'''async function sendClientCodeEmail(env, email, code) {
  if (!env.RESEND_API_KEY) return { ok: false, error: 'email_service_not_configured' };
  const from = env.AUTH_FROM_EMAIL || 'Neptune Media <onboarding@resend.dev>';
  const response = await fetch('https://api.resend.com/emails', {
    method: 'POST',
    headers: { Authorization: `Bearer ${env.RESEND_API_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      from,
      to: [email],
      subject: 'Votre code d’accès Neptune Media',
      html: `<div style="font-family:Arial,sans-serif;max-width:560px;margin:auto;padding:32px"><h1>Votre espace Neptune Media</h1><p>Votre code de sécurité est :</p><p style="font-size:40px;font-weight:800;letter-spacing:10px">${code}</p><p>Il expire dans 10 minutes. Ne le transmettez à personne.</p></div>`,
      text: `Votre code de sécurité Neptune Media est ${code}. Il expire dans 10 minutes.`,
    }),
  });
  if (!response.ok) {
    console.error('client_code_email_failed', response.status, await response.text());
    return { ok: false, error: 'email_send_failed' };
  }
  return { ok: true };
}

function clientSessionCookie(token, requestUrl, maxAge) {
  const secure = new URL(requestUrl).protocol === 'https:' ? '; Secure' : '';
  return `__Host-neptune_client=${encodeURIComponent(token)}; Path=/; HttpOnly; SameSite=Strict; Max-Age=${maxAge}${secure}`;
}

function clearClientSessionCookie(requestUrl) {
  const secure = new URL(requestUrl).protocol === 'https:' ? '; Secure' : '';
  return `__Host-neptune_client=; Path=/; HttpOnly; SameSite=Strict; Max-Age=0${secure}`;
}

function clientSessionToken(request) {
  return parseCookies(request.headers.get('Cookie') || '').__Host_neptune_client
    || parseCookies(request.headers.get('Cookie') || '')['__Host-neptune_client']
    || '';
}

'''
              if anchor not in index:
                  raise SystemExit('email helper anchor missing')
              index = index.replace(anchor, helper + anchor, 1)

          if 'data-tab="clients"' not in studio_html:
              studio_html = studio_html.replace(
                  '<button class="nav-btn" data-tab="users" data-role="admin"><span>◎</span>Utilisateurs</button>',
                  '<button class="nav-btn" data-tab="clients" data-role="admin"><span>◇</span>Clients</button>\n          <button class="nav-btn" data-tab="users" data-role="admin"><span>◎</span>Utilisateurs</button>',
                  1,
              )

          if "clients: 'Clients'" not in studio_js:
              studio_js = studio_js.replace(
                  "users: 'Utilisateurs', ai: 'Neptune Copilot', audit: 'Journal d’audit',",
                  "clients: 'Clients', users: 'Utilisateurs', ai: 'Neptune Copilot', audit: 'Journal d’audit',",
                  1,
              )

          if "function renderClients()" not in studio_js:
              marker = "function applyRoleVisibility() {"
              client_ui = r'''async function saveClientProject(event) {
  event.preventDefault();
  const form = new FormData(event.currentTarget);
  try {
    await api('/api/admin/client-save', {
      method: 'POST',
      body: JSON.stringify(Object.fromEntries(form.entries())),
    });
    toast('Espace client créé. Le client peut maintenant demander son code.');
    event.currentTarget.reset();
  } catch (error) { toast(humanError(error.message)); }
}

function renderClients() {
  return `<section class="panel"><div class="panel-head"><div><p class="eyebrow">PORTAIL CLIENT</p><h2>Créer un accès client</h2></div><a class="btn" href="/espace-client/" target="_blank" rel="noopener">Voir le portail</a></div>
    <form id="clientProjectForm" class="form-grid">
      <label><span>E-mail du client</span><input name="email" type="email" required></label>
      <label><span>Nom complet</span><input name="fullName" required></label>
      <label><span>Entreprise</span><input name="company"></label>
      <label><span>Nom du projet</span><input name="title" value="Interview Neptune Media" required></label>
      <label><span>Format</span><input name="format" placeholder="Hors Norme / Concept Libre"></label>
      <label><span>Rendez-vous</span><input name="appointmentAt" type="datetime-local"></label>
      <label><span>Date de tournage</span><input name="filmingAt" type="datetime-local"></label>
      <label class="span-2"><span>Prochaine action</span><input name="nextAction" placeholder="Préparer l’interview avant le tournage"></label>
      <input type="hidden" name="status" value="reservation_confirmed">
      <button class="btn btn-primary span-2" type="submit">Créer l’espace client</button>
    </form>
    <p class="message">Le client se connectera sans mot de passe avec un code reçu par e-mail.</p></section>`;
}

'''
              if marker not in studio_js:
                  raise SystemExit('studio ui anchor missing')
              studio_js = studio_js.replace(marker, client_ui + marker, 1)
              studio_js = studio_js.replace(
                  "function render() {",
                  "function render() {",
                  1,
              )
              # inject render branch and binder conservatively
              studio_js = studio_js.replace(
                  "  if (tab === 'dashboard')",
                  "  if (tab === 'clients') content.innerHTML = renderClients();\n  else if (tab === 'dashboard')",
