name: Persist render polish source

on:
  push:
    branches: [main]
    paths:
      - scripts/apply-render-polish-v7.py
      - .github/workflows/persist-render-polish-source.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: persist-render-polish-source
  cancel-in-progress: true

jobs:
  persist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Apply media fix and validate JavaScript
        run: |
          python3 scripts/apply-render-polish-v7.py
          cd neptune-tv-media-cloudflare
          npm run check
      - name: Commit polished source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            neptune-tv-media-cloudflare/public/index.html \
            neptune-tv-media-cloudflare/public/app.js \
            neptune-tv-media-cloudflare/public/ux-aida.js \
            neptune-tv-media-cloudflare/public/landing-conversion.js \
            neptune-tv-media-cloudflare/public/live-channel.js \
            neptune-tv-media-cloudflare/public/styles/neptune-streaming.css \
            neptune-tv-media-cloudflare/src/public-layout.js \
            neptune-tv-media-cloudflare/src/public-render.js \
            neptune-tv-media-cloudflare/src/public-router.js
          if git diff --cached --quiet; then
            echo "Media fix v7 source already persisted."
            exit 0
          fi
          git commit -m "feat: persist Neptune media render fix v7 [skip ci]"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin HEAD:main; then exit 0; fi
            sleep 3
          done
          exit 1
