name: Diagnose AIDA production

on:
  workflow_run:
    workflows: ["Deploy Neptune Media to Cloudflare"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      PUBLIC_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
      OFFICIAL_TUNNEL: https://media.neptunebusiness.com/
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check production UX, protected routes and discovery feeds
        shell: bash
        run: |
          set +e
          home_status=$(curl --silent --show-error --output /tmp/home.html --write-out '%{http_code}' "$PUBLIC_URL/")
          css_status=$(curl --silent --show-error --output /tmp/aida.css --write-out '%{http_code}' "$PUBLIC_URL/styles/ux-aida.css")
          js_status=$(curl --silent --show-error --output /tmp/aida.js --write-out '%{http_code}' "$PUBLIC_URL/ux-aida.js")
          direct_status=$(curl --silent --show-error --output /tmp/direct.html --write-out '%{http_code}' "$PUBLIC_URL/direct/")
          emissions_status=$(curl --silent --show-error --output /tmp/emissions.html --write-out '%{http_code}' "$PUBLIC_URL/emissions/")
          robots_status=$(curl --silent --show-error --output /tmp/robots.txt --write-out '%{http_code}' "$PUBLIC_URL/robots.txt")
          sitemap_status=$(curl --silent --show-error --output /tmp/sitemap.xml --write-out '%{http_code}' "$PUBLIC_URL/sitemap.xml")
          video_sitemap_status=$(curl --silent --show-error --output /tmp/video-sitemap.xml --write-out '%{http_code}' "$PUBLIC_URL/video-sitemap.xml")
          llms_status=$(curl --silent --show-error --output /tmp/llms.txt --write-out '%{http_code}' "$PUBLIC_URL/llms.txt")
          studio_status=$(curl --silent --show-error --dump-header /tmp/studio.headers --output /tmp/studio.html --write-out '%{http_code}' "$PUBLIC_URL/studio/")
          client_status=$(curl --silent --show-error --dump-header /tmp/client.headers --output /tmp/client.html --write-out '%{http_code}' "$PUBLIC_URL/espace-client/")
          admin_api_status=$(curl --silent --show-error --output /tmp/admin-api.json --write-out '%{http_code}' "$PUBLIC_URL/api/admin/clients")
          client_api_status=$(curl --silent --show-error --output /tmp/client-api.json --write-out '%{http_code}' "$PUBLIC_URL/api/client/session")
          webhook_status=$(curl --silent --show-error --output /tmp/webhook.json --write-out '%{http_code}' -X POST -H 'Content-Type: application/json' --data '{}' "$PUBLIC_URL/api/webhooks/conversion")

          has_marker=false; grep -q 'data-home-structure="streaming-aida-v3"' /tmp/home.html && has_marker=true
          has_attention=false; grep -q 'data-aida-stage="attention"' /tmp/home.html && has_attention=true
          has_interest=false; grep -q 'Vous recommencez la prise pour la sixième fois' /tmp/home.html && has_interest=true
          has_search=false; grep -q 'Invité, entreprise ou sujet' /tmp/home.html && has_search=true
          has_official_tunnel=false; grep -q "$OFFICIAL_TUNNEL" /tmp/home.html && has_official_tunnel=true
          worker_tunnel_leak=false; grep -Eq 'href=["'"'][^"'"']*workers\.dev' /tmp/home.html && worker_tunnel_leak=true
          has_css=false; grep -q 'interest-section' /tmp/aida.css && has_css=true
          has_js=false; grep -q 'neptune_watch_progress_v2' /tmp/aida.js && has_js=true
          direct_enhanced=false; grep -q '/ux-aida.js' /tmp/direct.html && direct_enhanced=true
          emissions_enhanced=false; grep -q '/styles/ux-aida.css' /tmp/emissions.html && emissions_enhanced=true
          robots_protected=false; grep -q '^Disallow: /studio/' /tmp/robots.txt && grep -q '^Disallow: /espace-client/' /tmp/robots.txt && grep -q '^Disallow: /api/' /tmp/robots.txt && robots_protected=true
          robots_discovery=false; grep -q '/sitemap.xml' /tmp/robots.txt && grep -q '/video-sitemap.xml' /tmp/robots.txt && robots_discovery=true
          sitemap_valid=false; grep -q '<urlset' /tmp/sitemap.xml && grep -q "$PUBLIC_URL" /tmp/sitemap.xml && sitemap_valid=true
          video_sitemap_valid=false; grep -q '<video:video>' /tmp/video-sitemap.xml && grep -q '<video:title>' /tmp/video-sitemap.xml && video_sitemap_valid=true
          llms_valid=false; grep -qi 'Neptune Media' /tmp/llms.txt && grep -q "$PUBLIC_URL" /tmp/llms.txt && llms_valid=true
          studio_no_store=false; grep -qi '^cache-control:.*no-store' /tmp/studio.headers && studio_no_store=true
          studio_noindex=false; grep -qi '^x-robots-tag:.*noindex' /tmp/studio.headers && studio_noindex=true
          client_no_store=false; grep -qi '^cache-control:.*no-store' /tmp/client.headers && client_no_store=true
          client_noindex=false; grep -qi '^x-robots-tag:.*noindex' /tmp/client.headers && client_noindex=true
          client_unauthenticated=false; grep -q '"authenticated":false' /tmp/client-api.json && client_unauthenticated=true

          ready=false
          if test "$home_status" = "200" && test "$css_status" = "200" && test "$js_status" = "200" && test "$direct_status" = "200" && test "$emissions_status" = "200" && test "$robots_status" = "200" && test "$sitemap_status" = "200" && test "$video_sitemap_status" = "200" && test "$llms_status" = "200" && test "$studio_status" = "200" && test "$client_status" = "200" && test "$admin_api_status" = "401" && test "$client_api_status" = "401" && test "$client_unauthenticated" = "true" && test "$webhook_status" = "401" && test "$has_marker" = "true" && test "$has_attention" = "true" && test "$has_interest" = "true" && test "$has_search" = "true" && test "$has_official_tunnel" = "true" && test "$worker_tunnel_leak" = "false" && test "$has_css" = "true" && test "$has_js" = "true" && test "$direct_enhanced" = "true" && test "$emissions_enhanced" = "true" && test "$robots_protected" = "true" && test "$robots_discovery" = "true" && test "$sitemap_valid" = "true" && test "$video_sitemap_valid" = "true" && test "$llms_valid" = "true" && test "$studio_no_store" = "true" && test "$studio_noindex" = "true" && test "$client_no_store" = "true" && test "$client_noindex" = "true"; then ready=true; fi

          HOME_STATUS="$home_status" CSS_STATUS="$css_status" JS_STATUS="$js_status" DIRECT_STATUS="$direct_status" EMISSIONS_STATUS="$emissions_status" ROBOTS_STATUS="$robots_status" SITEMAP_STATUS="$sitemap_status" VIDEO_SITEMAP_STATUS="$video_sitemap_status" LLMS_STATUS="$llms_status" STUDIO_STATUS="$studio_status" CLIENT_STATUS="$client_status" ADMIN_API_STATUS="$admin_api_status" CLIENT_API_STATUS="$client_api_status" CLIENT_UNAUTHENTICATED="$client_unauthenticated" WEBHOOK_STATUS="$webhook_status" HAS_MARKER="$has_marker" HAS_ATTENTION="$has_attention" HAS_INTEREST="$has_interest" HAS_SEARCH="$has_search" HAS_OFFICIAL_TUNNEL="$has_official_tunnel" WORKER_TUNNEL_LEAK="$worker_tunnel_leak" HAS_CSS="$has_css" HAS_JS="$has_js" DIRECT_ENHANCED="$direct_enhanced" EMISSIONS_ENHANCED="$emissions_enhanced" ROBOTS_PROTECTED="$robots_protected" ROBOTS_DISCOVERY="$robots_discovery" SITEMAP_VALID="$sitemap_valid" VIDEO_SITEMAP_VALID="$video_sitemap_valid" LLMS_VALID="$llms_valid" STUDIO_NO_STORE="$studio_no_store" STUDIO_NOINDEX="$studio_noindex" CLIENT_NO_STORE="$client_no_store" CLIENT_NOINDEX="$client_noindex" READY="$ready" python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          def truth(name):
              return os.environ[name] == "true"

          report = {
            "checked_at": datetime.now(timezone.utc).isoformat(),
            "ready": truth("READY"),
            "home": {"status": os.environ["HOME_STATUS"], "aida_marker": truth("HAS_MARKER"), "attention": truth("HAS_ATTENTION"), "hook": truth("HAS_INTEREST"), "search": truth("HAS_SEARCH"), "official_tunnel": truth("HAS_OFFICIAL_TUNNEL"), "worker_tunnel_leak": truth("WORKER_TUNNEL_LEAK")},
            "assets": {"css_status": os.environ["CSS_STATUS"], "css_loaded": truth("HAS_CSS"), "js_status": os.environ["JS_STATUS"], "js_loaded": truth("HAS_JS")},
            "public_pages": {"direct_status": os.environ["DIRECT_STATUS"], "direct_enhanced": truth("DIRECT_ENHANCED"), "emissions_status": os.environ["EMISSIONS_STATUS"], "emissions_enhanced": truth("EMISSIONS_ENHANCED")},
            "discovery": {"robots_status": os.environ["ROBOTS_STATUS"], "robots_protected": truth("ROBOTS_PROTECTED"), "robots_discovery": truth("ROBOTS_DISCOVERY"), "sitemap_status": os.environ["SITEMAP_STATUS"], "sitemap_valid": truth("SITEMAP_VALID"), "video_sitemap_status": os.environ["VIDEO_SITEMAP_STATUS"], "video_sitemap_valid": truth("VIDEO_SITEMAP_VALID"), "llms_status": os.environ["LLMS_STATUS"], "llms_valid": truth("LLMS_VALID")},
            "protected_pages": {"studio_status": os.environ["STUDIO_STATUS"], "studio_no_store": truth("STUDIO_NO_STORE"), "studio_noindex": truth("STUDIO_NOINDEX"), "client_status": os.environ["CLIENT_STATUS"], "client_no_store": truth("CLIENT_NO_STORE"), "client_noindex": truth("CLIENT_NOINDEX")},
            "protected_apis": {"admin_status": os.environ["ADMIN_API_STATUS"], "client_status": os.environ["CLIENT_API_STATUS"], "client_unauthenticated": truth("CLIENT_UNAUTHENTICATED"), "webhook_status": os.environ["WEBHOOK_STATUS"]}
          }
          with open("aida-production-diagnostic.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

      - name: Record diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aida-production-diagnostic.json
          git commit -m "chore: record AIDA production diagnostic [skip ci]" || true
          git push
