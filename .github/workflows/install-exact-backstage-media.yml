name: Install exact Neptune backstage media

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: install-exact-backstage-media
  cancel-in-progress: false

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install media tools
        run: |
          python -m pip install --quiet gdown
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y ffmpeg
          fi

      - name: Download exact supplied media
        run: |
          mkdir -p .tmp-backstage neptune-tv-media-cloudflare/public/assets/backstage
          gdown 1WlyVRXsKSxMsDov2mapvWhEoak5e8y57 -O .tmp-backstage/studio.mov
          gdown 16EQ9ZB_bX6l5RxdWr4KURGhKgLKjYoCs -O .tmp-backstage/team.mov
          gdown 1zNuZx-QK9qeZvxfwHkHoQ4s-cZs68Ls- -O .tmp-backstage/control-room.mov
          gdown 1QT_UW8AWvBtv48lRdlgNKER0dmis8upO -O .tmp-backstage/connexio.png

      - name: Convert for reliable web playback
        run: |
          OUT=neptune-tv-media-cloudflare/public/assets/backstage
          COMMON="scale=720:1280:force_original_aspect_ratio=decrease,pad=720:1280:(ow-iw)/2:(oh-ih)/2:black,fps=24"
          ffmpeg -y -i .tmp-backstage/studio.mov -an -vf "$COMMON" -c:v libx264 -profile:v high -level 4.0 -preset medium -crf 24 -pix_fmt yuv420p -movflags +faststart "$OUT/studio-preparation.mp4"
          ffmpeg -y -i .tmp-backstage/team.mov -an -vf "$COMMON" -c:v libx264 -profile:v high -level 4.0 -preset medium -crf 24 -pix_fmt yuv420p -movflags +faststart "$OUT/team-preview.mp4"
          ffmpeg -y -i .tmp-backstage/control-room.mov -an -vf "$COMMON" -c:v libx264 -profile:v high -level 4.0 -preset medium -crf 24 -pix_fmt yuv420p -movflags +faststart "$OUT/control-room.mp4"
          ffmpeg -y -i .tmp-backstage/connexio.png -vf "scale='min(1600,iw)':-2" -c:v libwebp -quality 84 -compression_level 6 "$OUT/connexio-team.webp"
          ffmpeg -y -ss 0.5 -i "$OUT/studio-preparation.mp4" -frames:v 1 -vf scale=720:-2 -c:v libwebp -quality 82 "$OUT/studio-preparation.webp"
          ffmpeg -y -ss 0.5 -i "$OUT/team-preview.mp4" -frames:v 1 -vf scale=720:-2 -c:v libwebp -quality 82 "$OUT/team-preview.webp"
          ffmpeg -y -ss 0.5 -i "$OUT/control-room.mp4" -frames:v 1 -vf scale=720:-2 -c:v libwebp -quality 82 "$OUT/control-room.webp"

      - name: Point the section to the exact local media
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('neptune-tv-media-cloudflare/src/landing-html-fix.js')
          text = path.read_text(encoding='utf-8')

          old_blocks = [
          '''<video muted loop playsinline preload="none" poster="/assets/posters/studio-wide.webp" data-backstage-video data-src="https://drive.usercontent.google.com/download?id=1zNuZx-QK9qeZvxfwHkHoQ4s-cZs68Ls-&export=download&confirm=t" aria-label="Découverte du studio Neptune Media"></video>''',
          '''<video muted loop playsinline preload="none" poster="/assets/posters/studio-wide.webp" data-backstage-video data-src="https://drive.usercontent.google.com/download?id=16EQ9ZB_bX6l5RxdWr4KURGhKgLKjYoCs&export=download&confirm=t" aria-label="L’équipe vit les coulisses de l’émission"></video>''',
          '''<video muted loop playsinline preload="none" poster="/assets/posters/studio-wide.webp" data-backstage-video data-src="https://drive.usercontent.google.com/download?id=1WlyVRXsKSxMsDov2mapvWhEoak5e8y57&export=download&confirm=t" aria-label="La régie Neptune Media pilote le tournage"></video>''',
          '''<img src="/assets/posters/studio-wide.webp" data-backstage-src="https://drive.usercontent.google.com/download?id=1QT_UW8AWvBtv48lRdlgNKER0dmis8upO&export=download&confirm=t" alt="Équipe réunie sur le plateau Neptune Media pour le Jeu Connexio" loading="lazy" decoding="async">'''
          ]

          new_blocks = [
          '''<video muted loop playsinline preload="metadata" poster="/assets/backstage/studio-preparation.webp" data-backstage-video data-src="/assets/backstage/studio-preparation.mp4" aria-label="Découverte du studio Neptune Media avant le tournage"></video>''',
          '''<video muted loop playsinline preload="metadata" poster="/assets/backstage/team-preview.webp" data-backstage-video data-src="/assets/backstage/team-preview.mp4" aria-label="L’équipe accompagne et suit le tournage Neptune Media"></video>''',
          '''<video muted loop playsinline preload="metadata" poster="/assets/backstage/control-room.webp" data-backstage-video data-src="/assets/backstage/control-room.mp4" aria-label="La régie Neptune Media pilote le tournage en direct"></video>''',
          '''<img src="/assets/backstage/connexio-team.webp" alt="Quatre participants réunis sur le plateau Neptune Media pour le Jeu Connexio" loading="lazy" decoding="async">'''
          ]

          for old, new in zip(old_blocks, new_blocks):
              if old not in text:
                  raise SystemExit(f'Expected backstage block missing: {old[:90]}')
              text = text.replace(old, new)

          text = text.replace('data-backstage-version="3"', 'data-backstage-version="4"')
          text = text.replace('/styles/backstage-studio-v1.css?v=3', '/styles/backstage-studio-v1.css?v=4')
          text = text.replace('/backstage-studio-v1.js?v=3', '/backstage-studio-v1.js?v=4')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit exact media and remove this one-time workflow
        run: |
          rm -rf .tmp-backstage .github/workflows/install-exact-backstage-media.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add neptune-tv-media-cloudflare/public/assets/backstage neptune-tv-media-cloudflare/src/landing-html-fix.js .github/workflows/install-exact-backstage-media.yml
          git commit -m "Use exact supplied backstage videos and Connexio photo"
          git pull --rebase origin main
          git push origin HEAD:main
