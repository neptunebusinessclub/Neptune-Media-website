name: Trigger studio authentication implementation

on:
  push:
    paths:
      - .github/workflows/trigger-studio-auth.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger implementation workflow
        shell: bash
        run: |
          printf '\n# Triggered after Cloudflare email secret configuration\n' >> .github/workflows/implement-studio-password-reset.yml
          rm .github/workflows/trigger-studio-auth.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: activate studio password reset implementation"
          git push
