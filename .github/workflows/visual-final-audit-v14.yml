name: Visual Final Audit v14

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/visual-final-audit-v14.yml'
      - 'visual-audit-v14-trigger.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neptune-visual-final-v14
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BASE_URL: https://neptune-media-webtv.neptunebusinessclub.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: |
          mkdir -p /tmp/neptune-v14
          cd /tmp/neptune-v14
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.0 >/dev/null
          npx playwright install --with-deps chromium

      - name: Wait for final visual assets
        run: |
          set -euo pipefail
          ready=false
          for attempt in $(seq 1 24); do
            nonce="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl --fail --silent --show-error -H 'Cache-Control: no-cache' "$BASE_URL/?visual_v14=$nonce" > /tmp/home.html \
              && grep -q '/styles/visual-polish-v11.css?v=3' /tmp/home.html \
              && grep -q '/visual-polish-v11.js?v=3' /tmp/home.html \
              && curl --fail --silent --show-error "$BASE_URL/emissions/?visual_v14=$nonce" | grep -q '/visual-polish-v11.js?v=3'; then
              ready=true
              break
            fi
            sleep 10
          done
          test "$ready" = "true"

      - name: Capture and verify all critical renderings
        continue-on-error: true
        run: |
          rm -rf visual-audit/v14
          mkdir -p visual-audit/v14
          printf '{"run_id":%s,"artifact_name":"neptune-visual-final-v14-%s","source_sha":"%s"}\n' "$GITHUB_RUN_ID" "$GITHUB_RUN_ID" "$GITHUB_SHA" > visual-audit/v14/artifact-run.json
          cat > /tmp/neptune-v14/audit.mjs <<'JS'
          import { chromium } from 'playwright';
          import fs from 'node:fs/promises';
          import path from 'node:path';

          const base = process.env.BASE_URL;
          const out = path.resolve(process.cwd(), 'visual-audit/v14');
          const viewports = [
            { name: 'desktop-1440', width: 1440, height: 1000 },
            { name: 'tablet-834', width: 834, height: 1112 },
            { name: 'mobile-390', width: 390, height: 844 },
          ];
          const report = { generatedAt: new Date().toISOString(), base, renderings: [], issues: [] };
          const browser = await chromium.launch({ headless: true, args: ['--disable-dev-shm-usage'] });

          async function shot(page, viewport, pageName, selector, label) {
            const target = selector === 'page' ? page : page.locator(selector).first();
            if (selector !== 'page' && (!await target.count() || !await target.isVisible().catch(() => false))) {
              report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'missing-section', detail: `${label}: ${selector}` });
              return;
            }
            if (selector !== 'page') await target.scrollIntoViewIfNeeded().catch(() => {});
            await page.waitForTimeout(180);
            await target.screenshot({ path: path.join(out, `${pageName}-${viewport.name}-${label}.jpg`), type: 'jpeg', quality: 64, animations: 'disabled', fullPage: false }).catch((error) => {
              report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'screenshot', detail: `${label}: ${String(error)}` });
            });
          }

          async function diagnostics(page, viewport, pageName) {
            const values = await page.evaluate(() => {
              const isVisible = (element) => {
                if (element.closest('details:not([open])')) return false;
                const style = getComputedStyle(element);
                const rect = element.getBoundingClientRect();
                return style.display !== 'none' && style.visibility !== 'hidden' && Number(style.opacity) !== 0 && rect.width > 1 && rect.height > 1;
              };
              const identify = (element) => element.id ? `#${element.id}` : `${element.tagName.toLowerCase()}${[...element.classList].slice(0, 3).map((value) => `.${value}`).join('')}`;
              const documentWidth = Math.max(document.documentElement.scrollWidth, document.body.scrollWidth);
              const brokenImages = [...document.images].filter((image) => isVisible(image) && image.complete && image.naturalWidth === 0).map((image) => image.currentSrc || image.src);
              const clipped = [...document.querySelectorAll('h1,h2,h3,p,blockquote,button,a,span')]
                .filter((element) => isVisible(element) && !element.classList.contains('sr-only') && element.getAttribute('aria-hidden') !== 'true' && (element.textContent || '').trim().length > 8)
                .filter((element) => {
                  const style = getComputedStyle(element);
                  if (['auto', 'scroll'].includes(style.overflowX) || ['auto', 'scroll'].includes(style.overflowY)) return false;
                  if (style.webkitLineClamp && style.webkitLineClamp !== 'none') return false;
                  if (element.closest('.media-card-copy,.seo-card-copy')) return false;
                  return element.scrollWidth > element.clientWidth + 8 || element.scrollHeight > element.clientHeight + 8;
                })
                .map((element) => ({ selector: identify(element), text: element.textContent.trim().slice(0, 120) }));
              const skip = document.querySelector('.skip-link');
              const skipStyle = skip ? getComputedStyle(skip) : null;
              const finalCard = document.querySelector('.voice-final .cta-card');
              const finalThought = document.querySelector('.voice-final .inner-voice-hook')?.textContent.trim() || '';
              const proofCards = [...document.querySelectorAll('.proof-compact article')].map((card) => ({ client: card.clientHeight, scroll: card.scrollHeight }));
              return {
                polish: document.documentElement.dataset.visualPolish || '',
                overflow: documentWidth - innerWidth,
                brokenImages,
                clipped,
                legacyBlocks: document.body.matches('[data-home-structure="conversion-voice-v10"]') ? document.querySelectorAll('.media-discovery,.catalog-tools,#livrables').length : 0,
                duplicatePills: location.pathname.startsWith('/emissions') ? document.querySelectorAll('.catalogue-page > .program-pills').length : 0,
                finalThought,
                finalPseudo: finalCard ? getComputedStyle(finalCard, '::after').content : 'none',
                proofCards,
                skip: skipStyle ? { width: parseFloat(skipStyle.width), height: parseFloat(skipStyle.height), clipPath: skipStyle.clipPath, overflow: skipStyle.overflow } : null,
              };
            });
            report.renderings.push({ viewport, page: pageName, diagnostics: values });
            const add = (type, detail) => report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type, detail });
            if (values.polish !== 'v11') add('missing-polish', values.polish || 'absent');
            if (values.overflow > 3) add('horizontal-overflow', `${values.overflow}px`);
            if (values.legacyBlocks) add('legacy-blocks', String(values.legacyBlocks));
            if (values.duplicatePills) add('duplicate-filters', String(values.duplicatePills));
            if (pageName === 'home' && values.finalThought !== '« Je veux être plus visible. Mais je veux pas devenir quelqu’un d’autre pour y arriver. »') add('final-copy', values.finalThought);
            if (pageName === 'home' && !['none', 'normal', '""'].includes(values.finalPseudo)) add('final-pseudo', values.finalPseudo);
            if (pageName === 'home' && values.proofCards.some((card) => card.scroll > card.client + 4)) add('proof-clipping', JSON.stringify(values.proofCards));
            if (values.skip && !(values.skip.width <= 1 && values.skip.height <= 1 && values.skip.overflow === 'hidden')) add('skip-link-visible', JSON.stringify(values.skip));
            for (const src of values.brokenImages) add('broken-image', src);
            for (const item of values.clipped) add('clipped-text', `${item.selector}: ${item.text}`);
          }

          for (const viewport of viewports) {
            const context = await browser.newContext({ viewport: { width: viewport.width, height: viewport.height }, reducedMotion: 'reduce' });
            for (const pageName of ['home', 'emissions', 'direct']) {
              const route = pageName === 'home' ? '/' : `/${pageName}/`;
              const page = await context.newPage();
              const response = await page.goto(`${base}${route}?audit_v14=${Date.now()}`, { waitUntil: 'domcontentloaded', timeout: 60000 }).catch(() => null);
              if (!response || response.status() >= 400) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'http-page', detail: response ? String(response.status()) : 'navigation failed' });
              await page.waitForLoadState('networkidle', { timeout: 15000 }).catch(() => {});
              await page.waitForTimeout(2600);
              await diagnostics(page, viewport, pageName);

              if (pageName === 'home') {
                await shot(page, viewport, pageName, 'page', 'fold');
                await shot(page, viewport, pageName, '.voice-hero', 'hero');
                await shot(page, viewport, pageName, '#solution', 'solution');
                await shot(page, viewport, pageName, '#questions', 'faq');
                const barState = await page.evaluate(() => {
                  const bar = document.querySelector('.mobile-conversion-bar');
                  if (!bar) return null;
                  const style = getComputedStyle(bar);
                  return { hiddenClass: bar.classList.contains('visual-hidden'), opacity: style.opacity, pointerEvents: style.pointerEvents };
                });
                if (viewport.width <= 760 && barState && !(barState.hiddenClass && barState.pointerEvents === 'none')) report.issues.push({ severity: 'error', viewport: viewport.name, page: pageName, type: 'faq-mobile-bar-overlay', detail: JSON.stringify(barState) });
                await shot(page, viewport, pageName, '.voice-final', 'final');
                for (const [kind, selector] of [['episode', '#dynamicCatalog [data-episode-id], #dynamicCatalog [data-video-src]'], ['short', '#shortsCatalog [data-episode-id], #shortsCatalog [data-video-src]']]) {
                  const card = page.locator(selector).first();
                  if (await card.count()) {
                    await card.scrollIntoViewIfNeeded().catch(() => {});
                    await card.click().catch(() => {});
                    await page.waitForTimeout(800);
                    if (await page.locator('[data-video-modal].is-open').count()) {
                      await shot(page, viewport, pageName, 'page', `${kind}-modal`);
                      await page.locator('[data-video-close]').click().catch(() => {});
                    }
                  }
                }
              } else if (pageName === 'emissions') {
                await shot(page, viewport, pageName, 'page', 'fold');
                await shot(page, viewport, pageName, '.seo-search-panel', 'search');
                await shot(page, viewport, pageName, '[data-media-section="episode"]', 'episodes');
                await shot(page, viewport, pageName, '[data-media-section="short"]', 'shorts');
              } else {
                await shot(page, viewport, pageName, 'page', 'fold');
                await shot(page, viewport, pageName, '.live-channel,.live-empty-panel', 'channel');
              }
              await page.close();
            }
            await context.close();
          }

          await browser.close();
          await fs.writeFile(path.join(out, 'audit.json'), JSON.stringify(report, null, 2));
          const rows = report.issues.map((issue) => `| ${issue.viewport} | ${issue.page} | ${issue.type} | ${(issue.detail || '').replaceAll('|', '\\|')} |`).join('\n');
          await fs.writeFile(path.join(out, 'README.md'), `# Audit visuel final Neptune v14\n\nGénéré : ${report.generatedAt}\n\n- Rendus vérifiés : ${report.renderings.length}\n- Problèmes détectés : ${report.issues.length}\n\n| Écran | Page | Type | Détail |\n|---|---|---|---|\n${rows || '| — | — | — | Aucun problème détecté |'}\n`);
          JS
          node /tmp/neptune-v14/audit.mjs

      - name: Upload final screenshot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neptune-visual-final-v14-${{ github.run_id }}
          path: visual-audit/v14
          if-no-files-found: error
          retention-days: 14

      - name: Commit final visual evidence
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add visual-audit/v14
          git commit -m 'chore: capture Neptune final visual audit v14 [skip ci]' || true
          git pull --rebase origin main || true
          git push
